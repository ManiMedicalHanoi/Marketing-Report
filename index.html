<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>MMH Report Hub — Marketing & Product</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
:root{
  --mmh-blue:#3A5CAA; --mmh-navy:#0E2F5F; --mmh-yellow:#FFE100; --blue-2:#5B7FD0;
  --lb1:#C2D4F1; --lb2:#CADFEE; --lb3:#CFE2F3; --pale:#F0F7FF; --gray:#F5F7FA;
  --white:#FFFFFF; --text:#1a2340; --sub:#5a6a8a; --faint:#8a97b5; --border:#e2e8f5; --border-2:#d4ddef;
  --success:#22c55e; --success-bg:#dcfce7; --success-fg:#15803d;
  --info:#3b82f6; --info-bg:#dbeafe; --info-fg:#1d4ed8;
  --danger:#ef4444; --danger-bg:#fee2e2; --danger-fg:#b91c1c;
  --warn:#f59e0b; --warn-bg:#fef3c7; --warn-fg:#b45309;
  --idle-bg:#eef1f6; --idle-fg:#64748b;
  --r-xl:22px; --r-lg:14px; --r-md:10px; --r-sm:7px;
  --sh-sm:0 1px 3px rgba(14,47,95,.06); --sh-md:0 8px 24px rgba(14,47,95,.10); --sh-lg:0 16px 48px rgba(14,47,95,.16);
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --ease:cubic-bezier(.32,.72,0,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--gray);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}
body{min-height:100vh}
.mono{font-family:'DM Mono',monospace}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer}
.wrap{max-width:1460px;margin:0 auto;padding:0 26px 70px}
.hidden{display:none!important}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:#cdd6e8;border-radius:8px;border:3px solid var(--gray)}

/* ══ LOADING / LOGIN GATE ══ */
#gate{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(130% 120% at 100% 0,#1a4478 0,#0E2F5F 60%)}
#gate::before{content:"";position:absolute;right:-140px;top:-140px;width:460px;height:460px;border-radius:50%;background:var(--mmh-yellow);opacity:.07}
.gate-card{position:relative;z-index:1;background:#fff;border-radius:24px;box-shadow:var(--sh-lg);max-width:440px;width:100%;padding:36px 34px;text-align:center;animation:pop .3s var(--ease)}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:none;opacity:1}}
.gate-logo{width:64px;height:64px;background:var(--mmh-yellow);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 22px rgba(0,0,0,.18)}
.gate-logo span{color:var(--mmh-navy);font-size:20px;font-weight:800;letter-spacing:-.5px}
.gate-card h1{font-size:22px;font-weight:800;color:var(--mmh-navy)}
.gate-card .sub{font-size:13px;color:var(--sub);margin-top:6px;line-height:1.5}
.gate-spinner{width:38px;height:38px;border:3.5px solid var(--lb1);border-top-color:var(--mmh-blue);border-radius:50%;animation:spin .8s linear infinite;margin:24px auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.gate-status{font-size:12.5px;color:var(--sub);margin-top:10px;min-height:18px}
.gate-err{display:none;margin-top:18px;background:var(--danger-bg);border:1px solid #f5c2c2;border-radius:12px;padding:14px 16px;text-align:left}
.gate-err.show{display:block}
.gate-err b{color:var(--danger-fg);font-size:13px}
.gate-err p{font-size:12px;color:var(--sub);line-height:1.6;margin-top:6px}
.gate-err code{background:#fff;padding:1px 5px;border-radius:4px;font-size:11px}
.gate-btn{margin-top:16px;background:var(--mmh-blue);color:#fff;border:none;padding:12px 22px;border-radius:12px;font-size:13.5px;font-weight:700}
.gate-mail{margin-top:14px;font-size:12px;color:var(--faint)}

/* ══ TOP BAR ══ */
#topbar{background:linear-gradient(120deg,var(--mmh-navy),var(--mmh-blue) 72%);box-shadow:var(--sh-md);position:sticky;top:0;z-index:60}
.tb-inner{max-width:1460px;margin:0 auto;padding:15px 26px;display:flex;align-items:center;gap:16px}
.tb-logo{width:42px;height:42px;background:var(--mmh-yellow);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.18)}
.tb-logo span{color:var(--mmh-navy);font-size:15px;font-weight:800;letter-spacing:-.5px}
.tb-title h1{color:#fff;font-size:17px;font-weight:800;line-height:1.1}
.tb-title p{color:#c7d6ef;font-size:11px;margin-top:2px}
.tb-sp{flex:1}
.tb-user{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:6px 14px 6px 7px}
.tb-av{width:34px;height:34px;border-radius:50%;background:var(--mmh-yellow);color:var(--mmh-navy);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-ut{line-height:1.25;text-align:left}
.tb-ut b{color:#fff;font-size:13px;display:block}
.tb-ut span{color:#c7d6ef;font-size:10.5px}
.tb-role{background:rgba(255,225,0,.16);border:1px solid rgba(255,225,0,.4);color:var(--mmh-yellow);font-size:10px;font-weight:700;padding:4px 10px;border-radius:14px;white-space:nowrap}
.tb-role.pic{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.25);color:#fff}
.tb-out{background:rgba(255,255,255,.12);border:none;width:34px;height:34px;border-radius:10px;color:#fff;display:flex;align-items:center;justify-content:center}
.tb-out:hover{background:rgba(255,255,255,.24)}
.tb-out svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* ══ TABS NAV ══ */
#tabnav{display:flex;gap:4px;border-bottom:1.5px solid var(--border);margin-top:20px;overflow-x:auto;scrollbar-width:none}
#tabnav::-webkit-scrollbar{display:none}
.tabbtn{padding:12px 18px;font-size:13px;font-weight:700;color:var(--sub);background:none;border:none;border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:7px;white-space:nowrap}
.tabbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.tabbtn.active{color:var(--mmh-blue);border-bottom-color:var(--mmh-blue)}
.tabbtn:hover{color:var(--mmh-blue)}
.tabbtn.locked{opacity:.4;cursor:not-allowed}
.tabpage{display:none;padding-top:22px;animation:fade .25s var(--ease)}
.tabpage.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ══ KPI ROW ══ */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 15px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.kpi-ic{position:absolute;right:12px;top:12px;font-size:17px;opacity:.85}
.kpi-val{font-size:24px;font-weight:800;color:var(--mmh-navy);line-height:1}
.kpi-label{font-size:10.5px;color:var(--sub);margin-top:7px;font-weight:600}
.kpi-card.c-done .kpi-val{color:var(--success-fg)}
.kpi-card.c-prog .kpi-val{color:var(--info-fg)}
.kpi-card.c-over .kpi-val{color:var(--danger-fg)}
.kpi-card.c-idle .kpi-val{color:var(--idle-fg)}
.kpi-card.accent{background:linear-gradient(135deg,var(--mmh-navy),#1a4478);border:none}
.kpi-card.accent .kpi-val{color:var(--mmh-yellow)}
.kpi-card.accent .kpi-label{color:rgba(255,255,255,.75)}

/* ══ SECTION / PANEL ══ */
.section-title{display:flex;align-items:center;gap:12px;margin:28px 0 14px}
.section-title h2{font-size:16px;font-weight:800;color:var(--mmh-navy)}
.section-title .hint{font-size:12px;color:var(--faint)}
.section-title .sp{flex:1}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);margin-bottom:16px;overflow:hidden}
.panel-pad{padding:18px}
.panel h3{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ══ PIC / DEPT STRIP ══ */
.pic-strip{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r-md);margin:8px 0 14px;background:var(--pale)}
.pic-strip .ps-av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.pic-strip .ps-name{font-size:14px;font-weight:800;color:var(--mmh-navy)}
.pic-strip .ps-stats{margin-left:auto;display:flex;gap:16px;font-size:11.5px;font-weight:600;color:var(--sub)}
.pic-strip .ps-stats b{font-weight:800;color:var(--mmh-navy)}

/* ══ TASK CELL GRID ══ */
.cell-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:12px}
.task-cell{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:14px;transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column;gap:9px}
.task-cell:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.tc-top{display:flex;align-items:center;gap:6px}
.tc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tc-status{font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:10px;margin-left:auto;white-space:nowrap}
.tc-title{font-size:12.8px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
.tc-pic{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);font-weight:600}
.tc-pic-av{width:20px;height:20px;border-radius:50%;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tc-progbar{height:5px;background:var(--lb3);border-radius:3px;overflow:hidden}
.tc-progfill{height:100%;border-radius:3px;transition:width .6s var(--ease)}
.tc-bottom{display:flex;justify-content:space-between;font-size:10.5px;color:var(--sub)}
.st-done{background:var(--success-bg);color:var(--success-fg)}
.st-inprogress{background:var(--info-bg);color:var(--info-fg)}
.st-overdue{background:var(--danger-bg);color:var(--danger-fg)}
.st-idle{background:var(--idle-bg);color:var(--idle-fg)}

/* ══ TOOLBAR / CHIPS ══ */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.search{flex:1;min-width:200px;position:relative}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--faint);fill:none;stroke-width:2}
.search input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:13px;outline:none;background:#fff}
.search input:focus{border-color:var(--mmh-blue)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:16px;border:1.5px solid var(--border);background:#fff;font-size:11.5px;font-weight:700;color:var(--sub);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.chip.active{color:#fff;border-color:transparent;background:var(--mmh-navy)}
.chip .cav{width:19px;height:19px;border-radius:50%;color:#fff;font-size:8.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
.sel{position:relative}
.sel select{appearance:none;-webkit-appearance:none;padding:9px 32px 9px 13px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:12.5px;font-weight:600;background:#fff;color:var(--text);outline:none}
.sel::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--sub);pointer-events:none;font-size:10px}
.btn-primary{background:var(--mmh-blue);color:#fff;border:none;padding:10px 16px;border-radius:var(--r-md);font-size:12.5px;font-weight:700;box-shadow:var(--sh-sm);display:inline-flex;align-items:center;gap:7px}
.btn-primary:hover{background:var(--mmh-navy)}
.btn-primary svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2}
.btn-primary:disabled{background:var(--idle-bg);color:var(--idle-fg);cursor:not-allowed;box-shadow:none}
.btn-secondary{background:#fff;color:var(--sub);border:1.5px solid var(--border);padding:10px 16px;border-radius:var(--r-md);font-size:12.5px;font-weight:700}
.btn-secondary:hover{border-color:var(--mmh-blue);color:var(--mmh-blue)}
.btn-ghost{background:none;border:none;color:var(--mmh-blue);font-size:12px;font-weight:700}

/* ══ GANTT ══ */
.gantt-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow-x:auto;padding-bottom:6px}
.gantt-grid{min-width:960px}
.gantt-hrow{display:grid;grid-template-columns:260px 1fr;border-bottom:1.5px solid var(--border);position:sticky;top:0;background:#fff;z-index:2}
.gantt-hlabel{padding:11px 16px;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center}
.gantt-weeks{display:grid;grid-auto-flow:column;grid-auto-columns:1fr}
.gantt-wcell{padding:10px 4px;font-size:9.5px;font-weight:700;color:var(--sub);text-align:center;border-left:1px solid var(--border)}
.gantt-krow{display:grid;grid-template-columns:260px 1fr;border-bottom:1.5px solid var(--border);align-items:center;min-height:44px;background:#fafbfe}
.gantt-srow{display:grid;grid-template-columns:260px 1fr;border-bottom:1px solid var(--border);align-items:center;min-height:38px}
.gantt-srow:hover{background:var(--pale)}
.gantt-rlabel{padding:8px 16px;font-size:11.5px;color:var(--text);display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-rlabel.key{font-weight:700}
.gantt-rlabel.sub{padding-left:32px;font-size:11px;color:var(--sub)}
.gantt-rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gantt-track{position:relative;height:100%;display:grid;grid-auto-flow:column;grid-auto-columns:1fr}
.gantt-tcell{border-left:1px solid var(--border);height:100%}
.gantt-bar{position:absolute;top:8px;height:22px;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:9.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;box-shadow:var(--sh-sm);cursor:pointer}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:3}
.gantt-today-lb{position:absolute;top:-16px;left:-12px;font-size:8.5px;font-weight:800;color:#ef4444;white-space:nowrap}
.gantt-legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.gl-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);font-weight:600}
.gl-dot{width:9px;height:9px;border-radius:3px}

/* ══ KT DETAIL PANELS ══ */
.kt-panel{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);margin-bottom:14px;overflow:hidden}
.kt-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;flex-wrap:wrap}
.kt-head:hover{background:var(--pale)}
.kt-caret{width:16px;height:16px;stroke:var(--sub);fill:none;stroke-width:2.5;transition:transform .2s;flex-shrink:0}
.kt-head.open .kt-caret{transform:rotate(90deg)}
.kt-type-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap}
.kt-title{font-size:13.5px;font-weight:700;color:var(--text);flex:1;min-width:150px}
.kt-meta{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--sub);flex-wrap:wrap}
.kt-prog{width:110px}
.kt-actions{display:flex;gap:6px}
.icon-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:13px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{border-color:var(--mmh-blue);background:var(--pale)}
.kt-body{display:none;padding:6px 18px 16px}
.kt-body.open{display:block}
.sub-cell-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.sub-cell{background:var(--pale);border:1.5px solid var(--border);border-radius:var(--r-md);padding:12px;transition:box-shadow .15s}
.sub-cell:not(.locked){cursor:pointer}
.sub-cell:not(.locked):hover{box-shadow:var(--sh-md);border-color:var(--lb1)}
.sub-cell.locked{opacity:.72}
.sc-no{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)}
.sc-title{font-size:12.3px;font-weight:600;color:var(--text);line-height:1.35;margin:3px 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
.sc-foot{display:flex;justify-content:space-between;align-items:center}
.sc-pic{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--sub);font-weight:600}
.sc-pic-av{width:18px;height:18px;border-radius:50%;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center}
.sc-add{border:2px dashed var(--lb1);background:var(--pale);display:flex;align-items:center;justify-content:center;color:var(--mmh-blue);font-weight:700;font-size:12px;min-height:96px;cursor:pointer}
.sc-lock{font-size:11px;color:var(--faint)}

/* ══ MONTHLY ══ */
.month-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.mr-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden;margin-bottom:14px}
.mr-head{display:flex;align-items:center;gap:11px;flex-wrap:wrap;padding:13px 18px;border-bottom:1px solid var(--border);background:var(--pale)}
.mr-key{font-size:14px;font-weight:800;color:var(--mmh-navy);flex:1;min-width:150px}
.mr-type{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;background:#ede9fe;color:#7c3aed}
.mr-body{padding:15px 18px;font-size:12.8px;line-height:1.7;white-space:pre-wrap;color:var(--text)}
.mr-empty-txt{color:var(--faint);font-style:italic}

/* ══ REPORT ══ */
.report-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;padding:14px 16px;background:#fff;border:1px solid var(--border);border-radius:var(--r-lg)}
.seg{display:inline-flex;background:var(--gray);border:1.5px solid var(--border);border-radius:var(--r-md);padding:3px}
.seg button{border:none;background:none;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:700;color:var(--sub)}
.seg button.active{background:#fff;color:var(--mmh-blue);box-shadow:var(--sh-sm)}
.sub-table{width:100%;border-collapse:collapse}
.sub-table th{background:var(--gray);text-align:left;padding:8px 12px;font-size:10px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.sub-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top}
.sub-table tr:hover{background:var(--pale)}
.kt-dept-tag{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap}

/* ══ MODALS ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(14,47,95,.42);z-index:700;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal-overlay.show{display:flex;animation:fade .2s}
.modal-box{background:#fff;border-radius:var(--r-xl);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh-lg);animation:pop .25s var(--ease)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:16px;font-weight:800;color:var(--mmh-navy)}
.modal-close{width:34px;height:34px;border-radius:10px;border:none;background:var(--gray);color:var(--sub);font-size:17px}
.modal-close:hover{background:#e6ebf3}
.modal-body{padding:20px 22px}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:13.5px;outline:none;background:#fff;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--mmh-blue)}
.field input:disabled,.field textarea:disabled{background:var(--gray);color:var(--sub)}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.field-hint{font-size:11px;color:var(--faint);margin-top:5px}
.modal-footer{display:flex;gap:12px;justify-content:flex-end;margin-top:8px}
.voice-btn{background:var(--pale);border:1.5px dashed var(--mmh-blue);color:var(--mmh-blue);font-size:11px;font-weight:700;padding:6px 11px;border-radius:var(--r-sm);display:inline-flex;align-items:center;gap:5px}
.voice-btn.rec{background:var(--danger);border-color:var(--danger);color:#fff;border-style:solid;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
.field-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.field-label-row label{margin:0}
.radio-cards{display:flex;flex-direction:column;gap:10px}
.radio-card{display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid var(--border);border-radius:var(--r-md);cursor:pointer}
.radio-card:hover{border-color:var(--mmh-blue);background:var(--pale)}
.radio-card.sel{border-color:var(--mmh-blue);background:var(--pale)}
.radio-card .rc-ic{width:40px;height:40px;border-radius:11px;background:var(--pale);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.radio-card .rc-t{font-size:13.5px;font-weight:700;color:var(--text)}
.radio-card .rc-s{font-size:11.5px;color:var(--sub);margin-top:2px;line-height:1.4}
.radio-card input{width:18px;height:18px;flex-shrink:0}

/* ══ EMPTY / TOAST / OVERLAY ══ */
.empty{display:flex;flex-direction:column;align-items:center;padding:56px 24px;gap:12px}
.empty .ic{font-size:46px;opacity:.24}
.empty p{font-size:13.5px;color:var(--faint);text-align:center;line-height:1.55}
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--mmh-navy);color:#fff;padding:12px 22px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:960;box-shadow:var(--sh-lg);opacity:0;transition:all .3s;max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#overlay{position:fixed;inset:0;background:rgba(14,47,95,.4);z-index:900;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
#overlay.show{display:flex}
.ov-card{background:#fff;border-radius:var(--r-xl);padding:30px 40px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:var(--sh-lg);max-width:320px;text-align:center}
.ov-card h3{font-size:15px;color:var(--mmh-navy);font-weight:700}
.ov-card p{font-size:12.5px;color:var(--sub)}

@media(max-width:1000px){ .kpi-row{grid-template-columns:repeat(3,1fr)} }
@media(max-width:720px){
  .wrap{padding:0 14px 80px}
  .tb-inner{padding:12px 14px;gap:10px}
  .tb-ut{display:none}
  .kpi-row{grid-template-columns:1fr 1fr;gap:10px}
  .kpi-val{font-size:20px}
  .grid2{grid-template-columns:1fr}
  .field-row{grid-template-columns:1fr}
  .report-toolbar{flex-direction:column;align-items:stretch}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal-box{max-width:100%;border-radius:20px 20px 0 0}
  .kt-meta{width:100%}
}
</style>
</head>
<body>

<!-- ═══ GATE (Google login / loading) ═══ -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo"><span>MMH</span></div>
    <h1>Report Hub</h1>
    <div class="sub">Marketing &amp; Product · Weekly / Monthly Tracker</div>
    <div class="gate-spinner" id="gate-spin"></div>
    <div class="gate-status" id="gate-status">Đang xác thực tài khoản Google…</div>
    <div class="gate-err" id="gate-err">
      <b id="gate-err-title">Không nhận diện được tài khoản</b>
      <p id="gate-err-msg"></p>
    </div>
    <div class="gate-mail" id="gate-mail"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" style="display:none">
  <div id="topbar"><div class="tb-inner">
    <div class="tb-logo"><span>MMH</span></div>
    <div class="tb-title"><h1>Report Hub</h1><p>Marketing &amp; Product · Weekly / Monthly Tracker</p></div>
    <div class="tb-sp"></div>
    <div class="tb-user">
      <div class="tb-av" id="u-av">?</div>
      <div class="tb-ut"><b id="u-name">—</b><span id="u-email">—</span></div>
      <span class="tb-role" id="u-role">—</span>
      <button class="tb-out" title="Đăng xuất / đổi tài khoản" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M16 17l5-5-5-5M21 12H9M12 19a7 7 0 1 1 0-14"/></svg></button>
    </div>
  </div></div>

  <div class="wrap">
    <div id="tabnav"></div>
    <div id="tab-overview"  class="tabpage"></div>
    <div id="tab-gantt"     class="tabpage"></div>
    <div id="tab-month"     class="tabpage"></div>
    <div id="tab-detail"    class="tabpage"></div>
    <div id="tab-report"    class="tabpage"></div>
  </div>
</div>

<!-- ═══ MODALS host ═══ -->
<div id="modals"></div>

<div id="overlay"><div class="ov-card"><div class="gate-spinner" style="margin:0"></div><h3 id="ov-title">Đang xử lý</h3><p id="ov-msg">Vui lòng đợi…</p></div></div>
<div id="toast"></div>

<script>
/* CÙNG ORIGIN: file này chạy bên trong chính Web App, gọi thẳng /exec hiện hành → hết Failed to fetch */
var GAS_URL = window.location.pathname;   // ví dụ: /macros/s/AKfy.../exec — không kèm query string
</script>
<script>
/* ══════════════════════════════════════════════════════════════════════════════
   MMH REPORT HUB — Frontend logic
   Nối backend Google Apps Script (GAS_URL). Login bằng Google → nhận PIC theo email.
   ══════════════════════════════════════════════════════════════════════════════ */
"use strict";

/* ── Palette avatar theo tên ── */
var AV_COLORS=["#3A5CAA","#B0468C","#0E8A6E","#E08A00","#7c3aed","#c0392b","#0f766e","#2563eb","#db2777"];
function avColor(n){ var s=0,x=String(n||"?"); for(var i=0;i<x.length;i++)s+=x.charCodeAt(i); return AV_COLORS[s%AV_COLORS.length]; }
function initials(n){ var p=String(n||"?").trim().split(/\s+/); return (((p[0]||"")[0]||"")+((p[p.length-1]||"")[0]||"")).toUpperCase(); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function jsq(s){ return String(s==null?"":s).replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }
function $(id){ return document.getElementById(id); }

var STATUS_META={
  "Completed":{cls:"st-done",dot:"#22c55e",lbl:"✅ Hoàn thành"},
  "In Progress":{cls:"st-inprogress",dot:"#3b82f6",lbl:"🔵 Đang làm"},
  "Overdue":{cls:"st-overdue",dot:"#ef4444",lbl:"🔴 Quá hạn"},
  "Idle":{cls:"st-idle",dot:"#94a3b8",lbl:"⚪ Chưa bắt đầu"},
  "":{cls:"st-idle",dot:"#94a3b8",lbl:"⚪ Chưa bắt đầu"}
};
function stMeta(s){ return STATUS_META[s]||STATUS_META[""]; }
function statusProgress(s){ return /complet/i.test(s)?100:/progress/i.test(s)?50:/overdue/i.test(s)?40:0; }

var TYPE_COLORS={
  "Marketing-Digital Marketing":"#3A5CAA","Marketing-Design":"#8b5cf6","Marketing-Event":"#e11d48",
  "Marketing-Project":"#0891b2","Marketing-Promotion":"#f59e0b","Marketing-Customer care":"#0d9488",
  "Product-Training & Presentation":"#0E8A6E","Product-Data Organization":"#7c3aed","Product-Customer Claim":"#c026d3"
};
function typeColor(t){ return TYPE_COLORS[t]||"#3A5CAA"; }

/* ── STATE ── */
var S={
  user:null, keyTasks:[], monthly:[], pics:[], managers:[],
  statusOptions:["Idle","In Progress","Completed","Overdue"],
  typeOptions:[],
  tab:"overview",
  overviewPic:"",           // filter pic ở overview (manager)
  ganttType:"",             // filter type gantt
  detailType:"", detailQ:"", detailOpen:{},
  monthSel:"", monthType:"",
  reportView:"thisweek", reportFrom:"", reportTo:"",
  editCtx:null,
};
function isManager(){ return S.user && S.user.role==="manager"; }
function canEditPic(pic){ if(isManager())return true; return String(pic||"").toLowerCase()===String(S.user.pic||"").toLowerCase(); }

/* ── OVERLAY / TOAST ── */
var _tt;
function toast(m){ var t=$("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(_tt); _tt=setTimeout(function(){t.classList.remove("show");},3000); }
function overlay(on,title,msg){ var o=$("overlay"); if(title)$("ov-title").textContent=title; if(msg)$("ov-msg").textContent=msg; o.classList.toggle("show",!!on); }

/* ══════════════ API LAYER (GAS) ══════════════ */
function apiGet(action,extra){
  var params={action:action};
  if(extra) Object.keys(extra).forEach(function(k){params[k]=extra[k];});
  var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(params[k]);}).join("&");
  return fetch(GAS_URL+"?"+qs,{method:"GET",redirect:"follow",cache:"no-store"})
    .then(function(r){return r.text();})
    .then(function(t){ var j; try{j=JSON.parse(t);}catch(e){ throw new Error("Máy chủ trả về không phải JSON — kiểm tra quyền Web App (Anyone with Google Account)."); } if(j&&j.ok===false)throw new Error(j.error||"Lỗi"); return j; });
}
function apiPost(body){
  if(!body.action) throw new Error("thiếu action");
  return fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body),redirect:"follow"})
    .then(function(r){return r.text();})
    .then(function(t){ var j; try{j=JSON.parse(t);}catch(e){ throw new Error("Phản hồi không hợp lệ từ máy chủ"); } if(j&&j.ok===false)throw new Error(j.error||"Lỗi"); return j; });
}

/* ══════════════ BOOT / AUTH ══════════════ */
window.addEventListener("load",function(){ boot(); });
function boot(){
  gateStatus("Đang xác thực tài khoản Google…");
  apiGet("boot").then(function(res){
    if(!res.user || !res.user.known){
      gateError("Tài khoản chưa được cấp quyền",
        "Email <b>"+esc(res.user&&res.user.email||"(không đọc được)")+"</b> chưa nằm trong danh sách PIC của Marketing/Product.<br><br>"+
        "Hãy đăng nhập bằng đúng email công ty MMH của bạn (vd <code>marketing.mmh@manimedicalhanoi.com</code>), hoặc liên hệ quản trị để được thêm.");
      return;
    }
    S.user=res.user;
    S.keyTasks=res.keyTasks||[];
    S.monthly=res.monthly||[];
    S.pics=res.pics||[];
    S.managers=res.managers||[];
    S.statusOptions=res.statusOptions||S.statusOptions;
    S.typeOptions=res.typeOptions||[];
    startApp();
  }).catch(function(e){
    var msg=e.message||"";
    if(/JSON|Web App|Anyone/i.test(msg)){
      gateError("Chưa cấp quyền truy cập Web App",
        "Vào Apps Script ▸ Deploy ▸ Manage deployments ▸ Edit, đặt <b>Execute as: User accessing the web app</b> và <b>Who has access: Anyone with Google Account</b>, rồi Deploy lại.<br><br><code>"+esc(msg)+"</code>");
    } else {
      gateError("Không kết nối được máy chủ", esc(msg)+"<br><br>Kiểm tra mạng và thử lại.");
    }
  });
}
function gateStatus(m){ $("gate-status").textContent=m; }
function gateError(title,html){
  $("gate-spin").style.display="none"; $("gate-status").style.display="none";
  $("gate-err-title").textContent=title; $("gate-err-msg").innerHTML=html;
  $("gate-err").classList.add("show");
  $("gate-mail").innerHTML='<button class="gate-btn" onclick="location.reload()">↻ Thử lại</button>';
}
function startApp(){
  $("gate").style.display="none";
  $("app").style.display="block";
  $("u-av").textContent=initials(S.user.pic);
  $("u-av").style.background=avColor(S.user.pic);
  $("u-name").textContent=S.user.pic;
  $("u-email").textContent=S.user.email;
  var rp=$("u-role");
  if(isManager()){ rp.className="tb-role"; rp.textContent="⭐ Quản lý · "+(S.user.title||""); }
  else { rp.className="tb-role pic"; rp.textContent=S.user.title||"PIC"; }
  buildTabs();
  switchTab("overview");
}
function logout(){
  // Google session không thể xoá bằng JS; hướng dẫn người dùng đổi tài khoản
  toast("Để đổi tài khoản: đăng xuất Google hoặc mở bằng cửa sổ ẩn danh");
  window.open("https://accounts.google.com/Logout","_blank");
}

/* ══════════════ TABS ══════════════ */
var TABS=[
  {id:"overview",label:"Tổng quan",dash:true,icon:'<rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>'},
  {id:"gantt",label:"Gantt tuần",dash:false,icon:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>'},
  {id:"detail",label:"Chi tiết & Sub-task",dash:false,icon:'<path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h8M8 16h5"/>'},
  {id:"month",label:"Monthly Report",dash:false,icon:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>'},
  {id:"report",label:"Báo cáo tuần (PDF)",dash:false,icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h5"/>'},
];
function buildTabs(){
  // Dashboard (overview) chỉ cho manager + pic đều thấy (pic read-only theo yêu cầu "xem hết")
  $("tabnav").innerHTML=TABS.map(function(t){
    return '<button class="tabbtn'+(t.id===S.tab?" active":"")+'" data-tab="'+t.id+'" onclick="switchTab(\''+t.id+'\')">'
      +'<svg viewBox="0 0 24 24">'+t.icon+'</svg>'+esc(t.label)+'</button>';
  }).join("");
}
function switchTab(id){
  S.tab=id;
  document.querySelectorAll(".tabbtn").forEach(function(b){ b.classList.toggle("active",b.dataset.tab===id); });
  document.querySelectorAll(".tabpage").forEach(function(p){ p.classList.toggle("active",p.id==="tab-"+id); });
  window.scrollTo(0,0);
  if(id==="overview") renderOverview();
  else if(id==="gantt") renderGantt();
  else if(id==="detail") renderDetail();
  else if(id==="month") renderMonth();
  else if(id==="report") renderReport();
}

/* ══════════════ DATA HELPERS ══════════════ */
/* Tất cả PIC "xem hết" theo yêu cầu; chỉ khác quyền sửa. Nên visibleKeyTasks = tất cả. */
function allKeyTasks(){ return S.keyTasks; }
function ktProgress(kt){
  var subs=kt.subs||[]; if(!subs.length) return statusProgress(kt.status);
  var sum=0; subs.forEach(function(s){ sum+=statusProgress(s.status); });
  return Math.round(sum/subs.length);
}
function ktStatus(kt){
  var subs=kt.subs||[]; if(!subs.length) return kt.status||"Idle";
  var done=subs.filter(function(s){return /complet/i.test(s.status);}).length;
  var over=subs.some(function(s){return /overdue/i.test(s.status);});
  var prog=subs.some(function(s){return /progress/i.test(s.status);});
  if(over) return "Overdue";
  if(done===subs.length) return "Completed";
  if(prog||done>0) return "In Progress";
  return "Idle";
}
function allSubs(){
  var out=[]; S.keyTasks.forEach(function(k){ (k.subs||[]).forEach(function(s){ out.push({k:k,s:s}); }); }); return out;
}
function picList(){
  var set={}; S.keyTasks.forEach(function(k){ if(k.pic)set[k.pic]=1; (k.subs||[]).forEach(function(s){if(s.pic)set[s.pic]=1;}); });
  S.monthly.forEach(function(m){if(m.pic)set[m.pic]=1;});
  return Object.keys(set).sort();
}
function fmtVN(iso){ if(!iso)return ""; var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(String(iso)); return m?(m[3]+"/"+m[2]):String(iso); }
function fmtVNFull(iso){ if(!iso)return ""; var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(String(iso)); return m?(m[3]+"/"+m[2]+"/"+m[1]):String(iso); }
function fmtMonth(m){ var s=String(m||"").replace(/\D/g,""); return s.length>=6?(s.slice(4,6)+"/"+s.slice(0,4)):s; }

/* ══════════════════════════════════════════════════════════════════════════════
   TAB: OVERVIEW (Dashboard)
   ══════════════════════════════════════════════════════════════════════════════ */
function renderOverview(){
  var kts=allKeyTasks();
  var pics=picList();
  // filter theo pic đang chọn
  var filtered = S.overviewPic ? kts.filter(function(k){ return k.pic===S.overviewPic || (k.subs||[]).some(function(s){return s.pic===S.overviewPic;}); }) : kts;

  // KPI: đếm theo sub-task
  var subs=[]; filtered.forEach(function(k){ (k.subs||[]).forEach(function(s){ if(!S.overviewPic||s.pic===S.overviewPic) subs.push(s); }); });
  var done=subs.filter(function(s){return /complet/i.test(s.status);}).length;
  var prog=subs.filter(function(s){return /progress/i.test(s.status);}).length;
  var over=subs.filter(function(s){return /overdue/i.test(s.status);}).length;
  var idle=subs.filter(function(s){return /idle/i.test(s.status)||!s.status;}).length;

  var h="";
  // PIC filter chips (mọi người xem hết → luôn hiện để lọc nhanh)
  h+='<div class="chips" style="margin-bottom:18px">';
  h+='<button class="chip'+(S.overviewPic===""?" active":"")+'" onclick="setOverviewPic(\'\')">👥 Tất cả PIC</button>';
  pics.forEach(function(p){
    h+='<button class="chip'+(S.overviewPic===p?" active":"")+'" onclick="setOverviewPic(\''+jsq(p)+'\')">'
      +'<span class="cav" style="background:'+avColor(p)+'">'+esc(initials(p))+'</span>'+esc(p)+'</button>';
  });
  h+='</div>';

  // KPI row
  h+='<div class="kpi-row">'
    +kpiCard(filtered.length,"Key Task","📋","accent")
    +kpiCard(subs.length,"Sub-task","⚙️","")
    +kpiCard(done,"Hoàn thành","✅","c-done")
    +kpiCard(prog,"Đang làm","🔵","c-prog")
    +kpiCard(over,"Quá hạn","🔴","c-over")
    +kpiCard(idle,"Chưa bắt đầu","⚪","c-idle")
    +'</div>';

  // Per-PIC breakdown (khi xem tất cả)
  if(!S.overviewPic){
    h+='<div class="section-title"><h2>Hiệu suất theo nhân sự</h2><span class="hint">bấm để lọc</span></div>';
    h+='<div class="cell-grid" style="grid-template-columns:repeat(auto-fill,minmax(250px,1fr))">';
    pics.forEach(function(p){
      var ps=[]; kts.forEach(function(k){ (k.subs||[]).forEach(function(s){ if(s.pic===p) ps.push(s); }); });
      var pdone=ps.filter(function(s){return /complet/i.test(s.status);}).length;
      var pover=ps.filter(function(s){return /overdue/i.test(s.status);}).length;
      var rate=ps.length?Math.round(pdone/ps.length*100):0;
      var c=avColor(p);
      h+='<div class="task-cell" style="cursor:pointer" onclick="setOverviewPic(\''+jsq(p)+'\')">'
        +'<div class="tc-pic"><span class="tc-pic-av" style="background:'+c+'">'+esc(initials(p))+'</span><b style="font-size:13px;color:var(--text)">'+esc(p)+'</b>'
        +(S.managers.indexOf(p)>=0?'<span style="margin-left:auto;font-size:9px;color:var(--warn-fg);background:var(--warn-bg);padding:2px 7px;border-radius:8px;font-weight:700">⭐ QL</span>':'')+'</div>'
        +'<div class="tc-bottom"><span>'+ps.length+' sub-task</span><span>✅ '+pdone+(pover?' · <b style="color:var(--danger-fg)">🔴 '+pover+'</b>':'')+'</span></div>'
        +'<div class="tc-progbar"><div class="tc-progfill" style="width:'+rate+'%;background:'+c+'"></div></div>'

function kpiCard(val,label,ic,cls){

function groupCount(rows,fn){ var m={}; rows.forEach(function(r){ var k=fn(r)||"(khác)"; m[k]=(m[k]||0)+1; }); return Object.keys(m).map(function(k){return[k,m[k]];}).sort(function(a,b){return b[1]-a[1];}); }
function barsHTML(entries,kind){
  if(!entries.length) return '<p style="color:var(--faint);font-size:12px">Chưa có dữ liệu</p>';
  var max=Math.max.apply(null,entries.map(function(e){return e[1];}))||1;
  return entries.map(function(e){
    var p=Math.round(e[1]/max*100);
    var color= kind==="status" ? (/Hoàn/.test(e[0])?"#22c55e":/Đang/.test(e[0])?"#3b82f6":/Quá/.test(e[0])?"#ef4444":"#94a3b8") : typeColor(e[0]);
    return '<div style="padding:7px 0"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px">'+esc(e[0])+'</span><span style="font-size:12px;font-weight:700;color:'+color+'">'+e[1]+'</span></div>'
      +'<div style="height:7px;background:var(--lb3);border-radius:4px;overflow:hidden"><div style="height:100%;border-radius:4px;width:'+p+'%;background:'+color+'"></div></div></div>';
  }).join("");
}

/* ══════════════════════════════════════════════════════════════════════════════
   TAB: GANTT (tuần) — thanh timeline theo start → deadline
   ══════════════════════════════════════════════════════════════════════════════ */
function ganttRange(){
  // gom min start & max deadline từ dữ liệu, fallback quanh hôm nay
  var dates=[];
  S.keyTasks.forEach(function(k){
    [k.start,k.planned,k.revised].forEach(function(d){if(d)dates.push(d);});
    (k.subs||[]).forEach(function(s){[s.start,s.planned,s.revised,s.actual].forEach(function(d){if(d)dates.push(d);});});
  });
  var today=new Date(); today.setHours(0,0,0,0);
  var min,max;
  if(dates.length){ dates.sort(); min=new Date(dates[0]); max=new Date(dates[dates.length-1]); }
  else { min=new Date(today); max=new Date(today); }
  // đệm: lùi về đầu tuần, tối thiểu 6 tuần
  min=mondayOf(min);
  var weeks=Math.ceil((max-min)/(7*86400000))+1;
  if(weeks<6) weeks=6;
  return {start:min, weeks:weeks, today:today};
}
function mondayOf(d){ var x=new Date(d); x.setHours(0,0,0,0); var w=(x.getDay()+6)%7; x.setDate(x.getDate()-w); return x; }
function renderGantt(){
  var kts=allKeyTasks();
  var types=[...new Set(kts.map(function(k){return k.type;}).filter(Boolean))];
  if(S.ganttType) kts=kts.filter(function(k){return k.type===S.ganttType;});

  var h="";
  // toolbar
  h+='<div class="toolbar">';
  h+='<div class="chips"><button class="chip'+(S.ganttType===""?" active":"")+'" onclick="S.ganttType=\'\';renderGantt()">Tất cả loại</button>'
    +types.map(function(t){return '<button class="chip'+(S.ganttType===t?" active":"")+'" style="'+(S.ganttType===t?'background:'+typeColor(t):'')+'" onclick="S.ganttType=\''+jsq(t)+'\';renderGantt()">'+esc(t)+'</button>';}).join("")
    +'</div>';
  h+='<span style="flex:1"></span>';
  if(isManager()) h+='<button class="btn-primary" onclick="openAddKey()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Thêm Key Task</button>';
  h+='</div>';

  var R=ganttRange();
  var totalDays=R.weeks*7;
  function off(d){ return Math.round((new Date(d)-R.start)/86400000); }
  // header weeks
  var weekCells="";
  for(var w=0;w<R.weeks;w++){
    var wd=new Date(R.start); wd.setDate(wd.getDate()+w*7);
    weekCells+='<div class="gantt-wcell">T'+(w+1)+'<br><span style="font-weight:400;opacity:.7">'+fmtVN(toISO(wd))+'</span></div>';
  }
  var body="";
  var todayLeft=(off(toISO(R.today))/totalDays)*100;
  kts.forEach(function(k){
    var kstart=k.start||(k.subs&&k.subs[0]&&k.subs[0].start);
    var keff=k.revised||k.planned;
    var kbar=barStyle(kstart,keff,off,totalDays,typeColor(k.type));
    body+='<div class="gantt-krow">'
      +'<div class="gantt-rlabel key"><span class="gantt-rdot" style="background:'+stMeta(ktStatus(k)).dot+'"></span>'+esc(k.keyTask)+'</div>'
      +'<div class="gantt-track">'+weekTrackCells(R.weeks)
      +(kbar?'<div class="gantt-bar" style="'+kbar+'" onclick="openEdit(\''+jsq(k.no)+'\',null)">'+ktProgress(k)+'%</div>':'')
      +'</div></div>';
    (k.subs||[]).forEach(function(s){
      var seff=s.revised||s.planned;
      var sbar=barStyle(s.start,seff,off,totalDays,stMeta(s.status).dot);
      body+='<div class="gantt-srow">'
        +'<div class="gantt-rlabel sub"><span class="gantt-rdot" style="background:'+stMeta(s.status).dot+'"></span>'+esc(s.name||s.subTask)+'</div>'
        +'<div class="gantt-track">'+weekTrackCells(R.weeks)
        +(sbar?'<div class="gantt-bar" style="'+sbar+';height:18px;top:9px;font-size:9px" onclick="openEdit(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\')">'+esc(initials(s.pic))+'</div>':'')
        +'</div></div>';
    });
  });
  if(!body) body='<div class="empty"><div class="ic">📊</div><p>Chưa có key task nào.</p></div>';

  h+='<div class="gantt-wrap"><div class="gantt-grid">'
    +'<div class="gantt-hrow"><div class="gantt-hlabel">Key Task ▸ Sub Task</div><div class="gantt-weeks" style="position:relative">'
      +weekCells
      +(todayLeft>=0&&todayLeft<=100?'<div class="gantt-today" style="left:'+todayLeft+'%"><span class="gantt-today-lb">Hôm nay</span></div>':'')
    +'</div></div>'
    +body
    +'</div></div>';
  h+='<div class="gantt-legend">'
    +'<span class="gl-item"><span class="gl-dot" style="background:#22c55e"></span>Hoàn thành</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#3b82f6"></span>Đang làm</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#ef4444"></span>Quá hạn</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#94a3b8"></span>Chưa bắt đầu</span>'
    +'<span class="gl-item" style="margin-left:auto;color:var(--faint)">Bấm vào thanh để sửa</span></div>';
  $("tab-gantt").innerHTML=h;
}
function weekTrackCells(n){ var s=""; for(var i=0;i<n;i++)s+='<div class="gantt-tcell"></div>'; return s; }
function barStyle(start,end,off,totalDays,color){
  if(!start||!end) return "";
  var a=off(start), b=off(end);
  if(b<a) b=a;
  var left=(a/totalDays)*100, width=((b-a+1)/totalDays)*100;
  if(left<0){ width+=left; left=0; }
  if(left>100||width<=0) return "";
  if(left+width>100) width=100-left;
  return "left:"+left+"%;width:"+Math.max(width,1.5)+"%;background:"+color;
}
function toISO(d){ return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2); }

      +'<span class="kt-meta"><span>👤 '+esc(k.pic)+'</span>'
        +(k.start||k.planned?'<span>📅 '+fmtVN(k.start)+' → '+fmtVN(k.revised||k.planned)+(revised?' <b style="color:var(--warn-fg)">(dời)</b>':'')+'</span>':'')
      +'</span>'
      +'<span class="kt-prog"><div class="tc-progbar"><div class="tc-progfill" style="width:'+p+'%;background:'+c+'"></div></div></span>'

        +(editKey?'<button class="icon-btn" title="Sửa Key Task" onclick="openEdit(\''+jsq(k.no)+'\',null)">✏️</button>':'')
        +(isManager()?'<button class="icon-btn" title="Nhắc việc" onclick="openAssign(\''+jsq(k.no)+'\',null)">🔔</button>':'')
        +(isManager()?'<button class="icon-btn" title="Xoá Key Task" onclick="delRow(\''+jsq(k.no)+'\','+k.row+',true)">🗑️</button>':'')
      +'</span>'

    (k.subs||[]).forEach(function(s){
      var canE=canEditPic(s.pic);

      h+='<div class="sub-cell'+(canE?"":" locked")+'" '+(canE?'onclick="openEdit(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\')"':'')+'>'

/* ══════════════════════════════════════════════════════════════════════════════
   TAB: REPORT (xem trước tuần + tạo PDF gửi email)
   ══════════════════════════════════════════════════════════════════════════════ */
function renderReport(){
  if(!S.reportFrom||!S.reportTo){ var mon=mondayOf(new Date()); var sat=new Date(mon); sat.setDate(mon.getDate()+5); S.reportFrom=toISO(mon); S.reportTo=toISO(sat); }
  var subs=allSubs().filter(function(o){
    var s=o.s, eff=s.revised||s.planned;
    var inW=function(d){ return d && String(d).slice(0,10)>=S.reportFrom && String(d).slice(0,10)<=S.reportTo; };
    if(S.reportView==="thisweek") return inW(s.start)||inW(eff)||inW(s.actual)||/progress|overdue/i.test(s.status);
    // nextweek: bắt đầu tuần sau
    var nMon=addDaysISO(S.reportFrom,7), nSat=addDaysISO(S.reportTo,7);
    var inN=function(d){ return d&&String(d).slice(0,10)>=nMon&&String(d).slice(0,10)<=nSat; };
    return inN(s.start)||(!/complet/i.test(s.status)&&inN(eff));
  });

  var h="";
  h+='<div class="report-toolbar">'
    +'<div class="seg"><button class="'+(S.reportView==="thisweek"?"active":"")+'" onclick="S.reportView=\'thisweek\';renderReport()">📍 Tuần này</button>'
    +'<button class="'+(S.reportView==="nextweek"?"active":"")+'" onclick="S.reportView=\'nextweek\';renderReport()">⏭️ Tuần sau</button></div>'
    +'<div class="sel" style="display:flex;gap:8px;align-items:center"><span style="font-size:12px;color:var(--sub);font-weight:600">Từ</span>'
    +'<input type="date" value="'+S.reportFrom+'" onchange="S.reportFrom=this.value;renderReport()" style="padding:9px 11px;border:1.5px solid var(--border);border-radius:10px"/></div>'
    +'<div class="sel" style="display:flex;gap:8px;align-items:center"><span style="font-size:12px;color:var(--sub);font-weight:600">Đến</span>'
    +'<input type="date" value="'+S.reportTo+'" onchange="S.reportTo=this.value;renderReport()" style="padding:9px 11px;border:1.5px solid var(--border);border-radius:10px"/></div>'
    +'<span style="flex:1"></span>'
    +'<button class="btn-primary" onclick="openReportSend()"><svg viewBox="0 0 24 24"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>Tạo PDF &amp; gửi email</button>'
    +'</div>';
  h+='<div style="font-size:12px;color:var(--sub);margin-bottom:14px">'+
    (S.reportView==="thisweek"?"📍 Công việc trong tuần này":"⏭️ Công việc dự kiến tuần sau")+
    ' · <b>'+subs.length+'</b> sub-task</div>';

  if(!subs.length){ h+='<div class="empty"><div class="ic">📄</div><p>Không có công việc nào trong khoảng đã chọn.</p></div>'; $("tab-report").innerHTML=h; return; }
  // group by key task
  var byKey={};
  subs.forEach(function(o){ (byKey[o.k.no]=byKey[o.k.no]||{k:o.k,items:[]}).items.push(o.s); });
  Object.keys(byKey).forEach(function(kn){
    var b=byKey[kn], c=typeColor(b.k.type);
    h+='<div class="panel"><div class="mr-head" style="background:'+c+'12">'
      +'<span class="kt-dept-tag" style="background:'+c+'22;color:'+c+'">'+esc(b.k.type||"")+'</span>'
      +'<span class="mr-key" style="font-size:13.5px">'+esc(b.k.keyTask)+'</span>'
      +'<span style="font-size:11px;color:var(--sub)">👤 '+esc(b.k.pic)+'</span></div>'
      +'<table class="sub-table"><thead><tr><th>Sub Task</th><th style="width:90px">PIC</th><th style="width:120px">Trạng thái</th><th style="width:100px">Deadline</th><th>Kết quả / Link</th></tr></thead><tbody>'
      +b.items.map(function(s){ var sm=stMeta(s.status);
        return '<tr onclick="openEdit(\''+jsq(b.k.no)+'\',\''+jsq(s.no)+'\')" style="cursor:pointer">'
          +'<td style="font-weight:600">'+esc(s.name||s.subTask)+'</td>'

/* ══════════════ VOICE TO TEXT ══════════════ */
var _rec=null,_recTarget=null,_recBtn=null;
function toggleVoice(id,btn){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast("Trình duyệt không hỗ trợ voice-to-text"); return; }
  if(_rec){ stopVoice(); return; }
  _rec=new SR(); _rec.lang="vi-VN"; _rec.continuous=true; _rec.interimResults=true;
  _recTarget=$(id); _recBtn=btn;
  var base=_recTarget.value?(_recTarget.value+" "):"";
  btn.classList.add("rec"); btn.textContent="⏺ Đang nghe…";
  _rec.onresult=function(e){ var t=""; for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript; _recTarget.value=base+t; };
  _rec.onend=stopVoice; _rec.onerror=stopVoice;
  try{_rec.start();}catch(e){}
}
function stopVoice(){ if(_rec){try{_rec.stop();}catch(e){}_rec=null;} if(_recBtn){_recBtn.classList.remove("rec");_recBtn.textContent="🎤 Nói";_recBtn=null;} _recTarget=null; }
