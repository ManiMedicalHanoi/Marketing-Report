/* Gantt vẽ theo khoảng dùng chung S.dateFrom/dateTo */
function ganttRange(){
  var start=new Date(S.dateFrom+"T00:00:00"); start.setHours(0,0,0,0);
  var end=new Date(S.dateTo+"T00:00:00"); end.setHours(0,0,0,0);
  if(end<start){ var t=start; start=end; end=t; }
  var days=Math.round((end-start)/86400000)+1;
  if(days>62){ // giới hạn để không quá rộng
    end=new Date(start); end.setDate(start.getDate()+61); days=62;
  }
  var today=new Date(); today.setHours(0,0,0,0);
  return { start:start, end:end, days:days, today:today };
}
function ganttToggleKey(no){ S.ganttOpen[no]=!S.ganttOpen[no]; renderGantt(); }
function ganttExpandAll(){
  var kts=allKeyTasks(); if(S.ganttType) kts=kts.filter(function(k){return k.type===S.ganttType;});
  var anyOpen=kts.some(function(k){return S.ganttOpen[k.no];});
  S.ganttOpen={}; if(!anyOpen) kts.forEach(function(k){ S.ganttOpen[k.no]=true; });
  renderGantt();
}
function renderGantt(){
  var kts=allKeyTasks();
  var types=[...new Set(kts.map(function(k){return k.type;}).filter(Boolean))];
  if(S.ganttType) kts=kts.filter(function(k){return k.type===S.ganttType;});

  var R=ganttRange();
  var totalDays=R.days;
  function off(d){ return Math.round((new Date(d)-R.start)/86400000); }
  var todayISOv=toISO(R.today);
  var rStart=toISO(R.start), rEnd=toISO(R.end);

  // ⭐ chỉ hiện key task có khoảng thời gian GIAO với khoảng chọn (bỏ "ngoài tháng này")
  function rangeOverlap(a1,a2){
    if(!a1||!a2) return false;
    var s=String(a1).slice(0,10), e=String(a2).slice(0,10);
    if(e<s){ var t=s;s=e;e=t; }
    return !(e<rStart || s>rEnd);   // giao nhau
  }
  function keyInGantt(k){
    var subs=k.subs||[];
    // key có bar riêng giao?
    var kEff=k.revised||k.planned;
    if(rangeOverlap(k.start, kEff)) return true;
    // hoặc bất kỳ sub nào giao
    return subs.some(function(s){ return rangeOverlap(s.start, s.revised||s.planned); });
  }
  kts = kts.filter(keyInGantt);

  var h="";
  // bộ lọc thời gian dùng chung (Gantt đổi theo khoảng)
  h+=timeFilterBar();
  // chỉ giữ nút Mở/Ẩn sub-task (thêm Key/Sub đã có ở nút + FAB góc phải)
  h+='<div class="toolbar" style="justify-content:flex-end;gap:8px">';
  h+='<button class="gantt-expand-all" onclick="ganttExpandAll()">⇕ Mở/Ẩn sub-task</button>';
  h+='</div>';
  h+='<div class="chips" style="margin-bottom:14px"><button class="chip'+(S.ganttType===""?" active":"")+'" onclick="S.ganttType=\'\';renderGantt()">Tất cả loại</button>'
    +types.map(function(t){return '<button class="chip'+(S.ganttType===t?" active":"")+'" style="'+(S.ganttType===t?'background:'+typeColor(t):'')+'" onclick="S.ganttType=\''+jsq(t)+'\';renderGantt()">'+esc(t)+'</button>';}).join("")
    +'</div>';

  var dayCells="";
  for(var d=0;d<totalDays;d++){
    var dd=new Date(R.start); dd.setDate(dd.getDate()+d);
    var dow=dd.getDay();
    var isToday=toISO(dd)===todayISOv;
    var isWeekend=(dow===0||dow===6);
    dayCells+='<div class="gantt-dcell'+(isToday?' today':'')+(isWeekend?' wknd':'')+'">'
      +'<span class="gd-dow">'+["CN","T2","T3","T4","T5","T6","T7"][dow]+'</span>'
      +'<span class="gd-num">'+dd.getDate()+'</span></div>';
  }

  var body="";
  var todayLeft=(off(todayISOv)/totalDays)*100;
  kts.forEach(function(k){
    var open=!!S.ganttOpen[k.no];
    var subs=k.subs||[];
    var doneCnt=subs.filter(function(s){return isDone(s.status);}).length;
    var kstart=k.start||(subs[0]&&subs[0].start);
    var keff=k.revised||k.planned;
    var kpct=ktProgress(k);
    var kbar=barStyle(kstart,keff,off,totalDays,typeColor(k.type));
    var kTip=esc(k.keyTask)+' — '+kpct+'% · '+esc(k.pic||'');
    // hàng KEY (bấm để xổ sub)
    body+='<div class="gantt-krow'+(open?' open':'')+'">'
      +'<div class="gantt-rlabel key" title="'+kTip+'" onclick="ganttToggleKey(\''+jsq(k.no)+'\')">'
        +(subs.length?'<svg class="gantt-caret" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>':'<span style="width:14px"></span>')
        +'<span class="gantt-rdot" style="background:'+stMeta(ktStatus(k)).dot+'"></span><span class="gantt-kname">'+esc(k.keyTask)+'</span>'
        +'<span class="gantt-kpct">'+kpct+'%</span>'
        +(subs.length?'<span class="gantt-ksub">'+doneCnt+'/'+subs.length+' sub</span>':'')
      +'</div>'
      +'<div class="gantt-track">'+dayTrackCells(totalDays,R)
      +(kbar?ganttBarHtml(kbar,kpct,kpct+'%',kTip,"openEdit('"+jsq(k.no)+"',null)"):'')
      +'</div></div>';
    // hàng SUB (chỉ khi mở)
    if(open){
      subs.forEach(function(s){
        var seff=s.revised||s.planned;
        var sc=stMeta(s.status).dot;
        var sbar=barStyle(s.start,seff,off,totalDays,sc);
        var spct=subPct(s);
        var sTip=esc(s.name||s.subTask)+' · '+esc(s.pic||'')+' · '+esc(s.status||'—')+' · '+spct+'%'+(s.start?' · '+fmtVN(s.start)+'→'+fmtVN(seff):'');
        var picLabel=esc(s.pic||'');
        body+='<div class="gantt-srow">'
          +'<div class="gantt-rlabel sub" title="'+sTip+'"><span class="gantt-rdot" style="background:'+sc+'"></span><span class="gantt-sname">'+esc(s.name||s.subTask)+'</span></div>'
          +'<div class="gantt-track">'+dayTrackCells(totalDays,R)
          +(sbar?ganttBarHtml(sbar,spct,picLabel+' · '+spct+'%',sTip,"openEdit('"+jsq(k.no)+"','"+jsq(s.no)+"')",true):'')
          +'</div></div>';
      });
    }
  });
  if(!body) body='<div class="empty"><div class="ic">📊</div><p>Chưa có key task nào.</p></div>';

  h+='<div class="gantt-wrap"><div class="gantt-grid" style="--gdays:'+totalDays+'">'
    +'<div class="gantt-hrow"><div class="gantt-hlabel">Key Task <small class="gantt-hlabel-sub">— Bấm để xem subtask</small></div><div class="gantt-days" style="position:relative">'
      +dayCells
      +(todayLeft>=0&&todayLeft<=100?'<div class="gantt-today-line" style="left:'+todayLeft+'%"><span class="gantt-today-lb">Hôm nay</span></div>':'')
    +'</div></div>'
    +body
    +'</div></div>';
  h+='<div class="gantt-legend">'
    +'<span class="gl-item"><span class="gl-dot" style="background:#22c55e"></span>Completed</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#3b82f6"></span>In Progress</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#94a3b8"></span>To Do</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#b8b2c2"></span>Cancelled</span>'
    +'<span class="gl-item" style="margin-left:auto;color:var(--faint)">Vệt sáng trong thanh = % tiến độ · bấm thanh để sửa</span></div>';
  $("tab-gantt").innerHTML=h;
}
/* thanh Gantt có fill % bên trong (real-time) */
function ganttBarHtml(style, pct, label, tip, onclickExpr, isSub){
  var inner = pct>0 ? '<div class="gantt-bar-inner" style="width:'+pct+'%"></div>' : '';
  return '<div class="gantt-bar'+(isSub?' gantt-bar-sub':'')+'" style="'+style+'" title="'+tip+'" onclick="'+onclickExpr+'">'
    +inner+'<span class="gbar-lbl">'+esc(label)+'</span></div>';
}
function dayTrackCells(n,R){
  var s="";
  for(var i=0;i<n;i++){
    var dd=new Date(R.start); dd.setDate(dd.getDate()+i);
    var wknd=(dd.getDay()===0||dd.getDay()===6);
    s+='<div class="gantt-tcell'+(wknd?' wknd':'')+'"></div>';
  }
  return s;
}
function barStyle(start,end,off,totalDays,color){
  if(!start||!end) return "";
  var a=off(start), b=off(end);
  if(b<a) b=a;
  var left=(a/totalDays)*100, width=((b-a+1)/totalDays)*100;
  if(left<0){ width+=left; left=0; }
  if(left>100||width<=0) return "";
  if(left+width>100) width=100-left;
  return "left:"+left+"%;width:"+Math.max(width,1.5)+"%;background:"+color;
}
function extractLinks(txt){
  if(!txt) return [];
  var m=String(txt).match(/https?:\/\/[^\s)]+/g);
  return m ? m.filter(function(v,i,a){return a.indexOf(v)===i;}) : [];
}
function linkify(txt){
  var s=esc(String(txt||""));
  s=s.replace(/(https?:\/\/[^\s)]+)/g,'<a href="$1" target="_blank" rel="noopener" class="sc-link">$1</a>');
  s=s.replace(/\n/g,'<br>');
  return s;
}
function showReferral(sno,name){
  var sub=null;
  allKeyTasks().forEach(function(k){ (k.subs||[]).forEach(function(s){ if(s.no===sno) sub=s; }); });
  if(!sub) return;
  var links=extractLinks(sub.result);
  var list=links.map(function(u){
    return '<a class="ref-item" href="'+esc(u)+'" target="_blank" rel="noopener">'
      +'<span class="ref-ic">🔗</span><span class="ref-url">'+esc(u)+'</span><span class="ref-go">↗</span></a>';
  }).join("");
  var html='<div class="modal-box"><div class="modal-head"><h3>🔗 Tham chiếu — '+esc(name)+'</h3><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-body">'
    +(links.length?'<div class="ref-list">'+list+'</div>':'<p style="color:var(--faint)">Không tìm thấy link nào.</p>')
    +'<div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Đóng</button></div>'
    +'</div></div>';
  showModal(html);
}

function togglePriorityMode(){ S.priorityMode=!S.priorityMode; if(!S.priorityMode)S.priorityMarks={}; renderDetail(); }

function openSendPriority(){

/* ── Render danh sách Key Task panels (dùng chung Detail + Overview-per-PIC) ──
 * picFilter: nếu != null, chỉ hiện sub-task của PIC đó.
 * Sub-task xổ theo TRỤC DỌC; nội dung ẩn dạng comment (bấm mới hiện).
 */
function detailKeyPanels(kts, from, to, picFilter, useTime){
  var h="";
  var picArr = picFilter ? (Array.isArray(picFilter)?picFilter:[picFilter]) : null;
  kts.forEach(function(k){
    var st=ktStatus(k), p=ktProgress(k), m=stMeta(st), c=typeColor(k.type);
    var open=!!S.detailOpen[k.no];
    var editKey=canEditPic(k.pic);
    var addSub = isManager() || canEditPic(k.pic);
    var revised = k.revised && k.planned && k.revised!==k.planned;
    var showAllSubs = !!S.detailShowAllSubs[k.no];

    // sub thuộc PIC filter
    var picSubs=(k.subs||[]).filter(function(s){ return !picArr || picArr.indexOf(s.pic)>=0; });
    // phân trong/ngoài khoảng
    var inSubs, outSubs;
    if(useTime && !showAllSubs){
      inSubs=picSubs.filter(function(s){ return subInRange(s,from,to); });
      outSubs=picSubs.filter(function(s){ return !subInRange(s,from,to); });
    } else {
      inSubs=picSubs; outSubs=[];
    }
    var shownSubs = showAllSubs ? picSubs : inSubs;
    var doneCnt=picSubs.filter(function(s){return isDone(s.status);}).length;
    var hiddenCount = (useTime && !showAllSubs) ? outSubs.length : 0;

    /* ── HEADER key ── */
    h+='<div class="kt-panel"><div class="kt-head'+(open?" open":"")+'" onclick="toggleDetail(\''+jsq(k.no)+'\')" ondblclick="event.stopPropagation();'+(editKey?'openEdit(\''+jsq(k.no)+'\',null)':'')+'">'
      +'<svg class="kt-caret" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'
      +'<span class="kt-type-tag" style="background:'+c+'18;color:'+c+'">'+esc(k.type||"—")+'</span>'
      +'<span class="kt-title">'+esc(k.keyTask)+'</span>'
      +'<span class="kt-hmeta">'
        +'<span class="khm khm-pic"><span class="khm-av" style="background:'+avColor(k.pic)+'">'+esc(initials(k.pic))+'</span>'+esc(k.pic||'—')+'</span>'
        +'<span class="khm khm-date">'+(k.start||k.planned?('📅 '+fmtVN(k.start)+' → '+fmtVN(k.revised||k.planned)+(revised?' *':'')):'—')+'</span>'
        +'<span class="khm khm-pct" style="color:'+c+'">'+p+'%</span>'
        +'<span class="khm khm-prog"><span class="kt-progbar"><span class="kt-progfill" style="width:'+p+'%;background:'+c+'"></span></span></span>'
        +'<span class="khm khm-sub">'+doneCnt+'/'+picSubs.length+'</span>'
        +'<span class="khm khm-status"><span class="tc-status '+m.cls+'">'+m.lbl+'</span></span>'
      +'</span>'
      +'<span class="kt-actions" onclick="event.stopPropagation()">'
        +(editKey?'<button class="icon-btn" title="Sửa Key Task" onclick="openEdit(\''+jsq(k.no)+'\',null)">✏️</button>':'')
        +(isManager()?'<button class="icon-btn" title="Nhắc việc" onclick="openAssign(\''+jsq(k.no)+'\',null)">🔔</button>':'')
        +(isManager()?'<button class="icon-btn" title="Xoá Key Task" onclick="delRow(\''+jsq(k.no)+'\','+k.row+',true)">🗑️</button>':'')
      +'</span>'
      +'</div>'
      +'<div class="kt-body'+(open?" open":"")+'"><div class="sub-list">';
    shownSubs.forEach(function(s){
      var outOfRange = useTime && !subInRange(s,from,to);
      h+=subRowVertical(k, s, outOfRange);
    });
    if(!shownSubs.length) h+='<div class="sub-empty">Không có công việc'+(useTime?' trong khoảng này':'')+'.</div>';
    // nút ẩn/hiện tất cả subtask (kể cả ngoài khoảng)
    if(useTime && picSubs.length){
      h+='<div class="sub-toggle-all" onclick="toggleShowAllSubs(\''+jsq(k.no)+'\')">'
        +(showAllSubs
           ? '▲ Chỉ hiện việc trong kỳ ('+inSubs.length+')'
           : '▼ Hiện tất cả subtask'+(hiddenCount?' (+'+hiddenCount+' ngoài kỳ)':'')+' — kể cả đã xong / chưa bắt đầu')
        +'</div>';
    }
    if(addSub) h+='<div class="sub-add-row" onclick="openAddSub(\''+jsq(k.no)+'\')">＋ Thêm Sub Task</div>';
    h+='</div></div></div>';
  });
  return h;
}
function toggleShowAllSubs(kno){ S.detailShowAllSubs[kno]=!S.detailShowAllSubs[kno]; renderDetailList(); }

/* ── 1 dòng sub-task theo trục dọc; comment ẩn; sửa nhanh status & % ── */
function subRowVertical(k, s, outOfRange){
  var canE=canEditPic(s.pic);
  var sm=stMeta(s.status);
  var links=extractLinks(s.result);
  var spct=subPct(s), scol=sm.dot;
  var showProg = isInProgress(s.status);   // chỉ In Progress mới cho chỉnh %
  var expanded = !!S.detailOpen["sub_"+s.no];
  var hasComment = !!(s.result && String(s.result).trim());
  var rid = jsq(k.no)+"|"+jsq(s.no);

  // Cụm % nhanh: thanh kéo + nút +/- (chỉ khi In Progress & có quyền)
  var progCell;
  if(showProg && canE){
    progCell = '<span class="sr-prog sr-prog-edit" onclick="event.stopPropagation()">'
      +'<button class="sr-pbtn" title="-5%" onclick="event.stopPropagation();bumpProg(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\',-5)">−</button>'
      +'<input type="range" class="sr-prange" min="0" max="100" step="5" value="'+spct+'" '
        +'oninput="onDragProg(this,\''+jsq(k.no)+'\',\''+jsq(s.no)+'\')" '
        +'onchange="commitProg(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\',this.value)"/>'
      +'<button class="sr-pbtn" title="+5%" onclick="event.stopPropagation();bumpProg(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\',5)">+</button>'
      +'<span class="sr-progpct" id="pct-'+esc(s.no)+'">'+spct+'%</span></span>';
  } else if(showProg){
    progCell = '<span class="sr-prog"><span class="sr-progbar"><span class="sr-progfill" style="width:'+spct+'%;background:'+scol+'"></span></span><span class="sr-progpct">'+spct+'%</span></span>';
  } else {
    progCell = '<span class="sr-prog sr-prog-empty"></span>';
  }

  // Status: dropdown nhanh (nếu có quyền) hoặc badge tĩnh
  var statusCell;
  if(canE){
    statusCell = '<span class="sr-st-wrap" onclick="event.stopPropagation()">'
      +'<select class="sr-st-sel '+sm.cls+'" onchange="quickStatus(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\',this.value)">'
      +S.statusOptions.map(function(o){return '<option value="'+esc(o)+'"'+(o===s.status?" selected":"")+'>'+esc(o)+'</option>';}).join("")
      +'</select></span>';
  } else {
    statusCell = '<span class="tc-status '+sm.cls+' sr-st">'+sm.lbl+'</span>';
  }

  // tag ngoài khoảng: "Đã hoàn thành bởi PIC từ dd/mm/yyyy" hoặc "Chưa bắt đầu - Start dd/mm/yyyy bởi PIC"
  var outTag='';
  if(outOfRange){
    if(isDone(s.status)){
      var doneDate = s.actual || s.revised || s.planned || '';
      outTag='<span class="sr-outtag done">✅ Đã hoàn thành bởi '+esc(s.pic||'—')+(doneDate?' từ '+fmtVN(doneDate):'')+'</span>';
    } else {
      outTag='<span class="sr-outtag todo">🕓 '+(s.start?('Bắt đầu dự kiến '+fmtVN(s.start)):'Chưa bắt đầu')+' bởi '+esc(s.pic||'—')+'</span>';
    }
  }
  // checkbox ưu tiên (chỉ khi đang ở chế độ priorityMode)
  var priCheck='';
  if(S.priorityMode){
    var marked=!!S.priorityMarks[jsq(k.no)+"|"+jsq(s.no)];
    var isDoneSub=isDone(s.status);
    priCheck='<span class="sr-pri" onclick="event.stopPropagation()">'
      +(isDoneSub
        ? '<span class="sr-pri-done" title="Đã hoàn thành — không cần nhắc">✓</span>'
        : '<span class="sr-pri-check'+(marked?" on":"")+'" onclick="togglePriorityMark(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\')" title="Đánh dấu ưu tiên">'+(marked?'⭐':'☆')+'</span>')
      +'</span>';
  }

  return '<div class="sub-row'+(canE?"":" locked")+(outOfRange?" out-range":"")+(S.priorityMarks[jsq(k.no)+"|"+jsq(s.no)]?" pri-marked":"")+'" id="sub-'+esc(s.no)+'">'
    +'<div class="sr-main'+(S.priorityMode?" has-pri":"")+'" onclick="toggleSubComment(\''+jsq(s.no)+'\')" ondblclick="event.stopPropagation();'+(canE?'openEdit(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\')':'')+'">'
      +priCheck
      +'<span class="sr-dot" style="background:'+scol+'"></span>'
      +'<span class="sr-no">'+esc(s.no)+'</span>'
      +'<span class="sr-namewrap"><span class="sr-name">'+esc(s.name||s.subTask)+'</span>'+outTag+'</span>'
      +progCell
      +'<span class="sr-pic"><span class="sr-pic-av" style="background:'+avColor(s.pic)+'">'+esc(initials(s.pic))+'</span>'+esc(s.pic||'—')+'</span>'
      +'<span class="sr-date">'+(effDate(s)?fmtVN(effDate(s)):'—')+'</span>'
      +statusCell
      +(hasComment?'<span class="sr-cmt-ic" title="Có ghi chú">💬</span>':'<span class="sr-cmt-ic"></span>')
      +'<svg class="sr-caret'+(expanded?" open":"")+'" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'
    +'</div>'
    +'<div class="sr-actions">'
      +(canE?'<button class="sr-edit" onclick="event.stopPropagation();openEdit(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\')" title="Sửa (hoặc double-click)">✏️</button>':'<span class="sr-lock">🔒</span>')
      +(canE?'<button class="sr-del" onclick="event.stopPropagation();delRow(\''+jsq(k.no)+'\','+s.row+',false)" title="Xoá">🗑️</button>':'')
    +'</div>'
    +'<div class="sr-comment'+(expanded?" open":"")+'">'
      +(hasComment
         ? '<div class="sr-cmt-lbl">💬 Kết quả / Cập nhật</div><div class="sr-cmt-txt">'+linkify(s.result)+'</div>'
         : '<div class="sr-cmt-empty">— chưa có kết quả — <span style="color:var(--mmh-blue);cursor:pointer" onclick="event.stopPropagation();'+(canE?'openEdit(\''+jsq(k.no)+'\',\''+jsq(s.no)+'\')':'')+'">'+(canE?'thêm ghi chú':'')+'</span></div>')
      +(links.length?'<button class="sr-ref-btn" onclick="event.stopPropagation();showReferral(\''+jsq(s.no)+'\',\''+jsq(s.name||s.subTask)+'\')">🔗 Tham chiếu ('+links.length+' link)</button>':'')
    +'</div>'
  +'</div>';
}
/* kéo thanh %: cập nhật số hiển thị tức thì (chưa lưu) */
function onDragProg(el,kno,sno){
  var v=el.value; var lbl=$("pct-"+sno); if(lbl) lbl.textContent=v+"%";
}
/* thả chuột / đổi → lưu % */
function commitProg(kno,sno,val){
  var s=findSub(kno,sno); if(!s) return;
  var v=parseInt(val,10); if(isNaN(v))v=0;
  s.progress=v;                       // cục bộ ngay
  var kk=findKey(kno); if(kk) {} 
  quietSaveProgress(s.row, v, kno);
}
/* nút +/- */
function bumpProg(kno,sno,delta){
  var s=findSub(kno,sno); if(!s) return;
  var v=subPct(s)+delta; if(v<0)v=0; if(v>100)v=100;
  s.progress=v;
  var lbl=$("pct-"+sno); if(lbl) lbl.textContent=v+"%";
  var rng=document.querySelector('#sub-'+cssEsc(sno)+' .sr-prange'); if(rng) rng.value=v;
  // cập nhật % key task hiển thị
  renderDetailList();
  quietSaveProgress(s.row, v, kno);
}
function cssEsc(s){ return String(s).replace(/[^a-zA-Z0-9_-]/g,function(c){return "\\"+c;}); }
/* lưu % im lặng (không overlay); cập nhật lại % key sau khi có kết quả */
var _progTimer={};
function quietSaveProgress(row, v, kno){
  if(!row){ return; }
  // debounce theo row để tránh spam khi kéo nhanh
  clearTimeout(_progTimer[row]);
  _progTimer[row]=setTimeout(function(){
    apiPost({action:"updateProgress", row:row, progress:v})
      .then(function(){ toast("✓ Đã lưu "+v+"%"); reloadSoft(); })
      .catch(function(e){ toast("⚠️ "+e.message); });
  }, 450);
}
/* đổi status nhanh */
function quickStatus(kno,sno,val){
  var s=findSub(kno,sno); if(!s) return;
  s.status=val;
  if(/complet/i.test(val)) s.progress=100;
  else if(/cancel/i.test(val)||/to\s*do/i.test(val)) s.progress=0;
  renderDetailList();
  apiPost({action:"updateStatus", row:s.row, status:val})
    .then(function(){ toast("✓ "+val); reloadSoft(); })
    .catch(function(e){ toast("⚠️ "+e.message); });
}
function toggleSubComment(no){ S.detailOpen["sub_"+no]=!S.detailOpen["sub_"+no]; rerenderActive(); }
function toggleDetail(no){ S.detailOpen[no]=!S.detailOpen[no]; rerenderActive(); }
function openDetailKey(no){ S.detailOpen[no]=true; if(S.tab==="detail")renderDetail(); else if(S.tab==="overview")renderOverview(); }

function monthList(){ var set={}; S.monthly.forEach(function(m){ if(m.month)set[m.month]=1; }); return Object.keys(set).sort().reverse(); }
function renderMonth(){

  var types=[...new Set(allRows.map(function(r){return r.typeTask;}).filter(Boolean))];
  var rows = S.monthType ? allRows.filter(function(r){return r.typeTask===S.monthType;}) : allRows;

  var filled=allRows.filter(function(r){return String(r.text||"").trim();}).length;
  var pct=allRows.length?Math.round(filled/allRows.length*100):0;
  var pics=[...new Set(allRows.map(function(r){return r.pic;}).filter(Boolean))];

  var h="";
  h+='<div class="toolbar">'

    +'</select></div>'
    +'<span style="flex:1"></span>'
    +'<button class="btn-secondary" onclick="openMonthlySend()"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>Gửi PDF tháng</button>'
    +'<button class="btn-primary" onclick="openAddMonthly()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Thêm mục</button>'
    +'</div>';

  if(!allRows.length){ h+='<div class="empty"><div class="ic">📅</div><p>Chưa có mục nào cho tháng này.</p></div>'; $("tab-month").innerHTML=h; return; }

  h+='<div class="mr-overview">'
    +'<div class="mro-left">'
      +'<div class="mro-month">📅 Tháng '+esc(fmtMonth(S.monthSel))+'</div>'
      +'<div class="mro-sub">'+allRows.length+' mục · '+types.length+' loại · '+pics.length+' PIC</div>'
    +'</div>'
    +'<div class="mro-stats">'
      +'<div class="mro-stat"><div class="mro-v">'+allRows.length+'</div><div class="mro-l">Tổng mục</div></div>'
      +'<div class="mro-stat"><div class="mro-v" style="color:#1E6B3A">'+filled+'</div><div class="mro-l">Đã điền</div></div>'
      +'<div class="mro-stat"><div class="mro-v" style="color:#8A6D00">'+(allRows.length-filled)+'</div><div class="mro-l">Còn trống</div></div>'
    +'</div>'
    +'<div class="mro-prog">'
      +'<div class="mro-prog-top"><span>Hoàn thiện</span><b>'+pct+'%</b></div>'
      +'<div class="mro-prog-track"><i style="width:'+pct+'%"></i></div>'
    +'</div>'
  +'</div>';

  h+='<div class="chips" style="margin-bottom:16px">';
  h+='<button class="chip'+(S.monthType===""?" active":"")+'" onclick="S.monthType=\'\';renderMonth()">Tất cả ('+allRows.length+')</button>';
  types.forEach(function(t){
    var c=typeColor(t), cnt=allRows.filter(function(r){return r.typeTask===t;}).length;
    h+='<button class="chip'+(S.monthType===t?" active":"")+'" style="'+(S.monthType===t?'background:'+c+';border-color:'+c:'')+'" onclick="S.monthType=\''+jsq(t)+'\';renderMonth()">'+esc(t)+' ('+cnt+')</button>';
  });
  h+='</div>';

  h+='<div class="mr-grid">';

    var editable=canEditPic(r.pic), c=typeColor(r.typeTask);

          +(editable?'<button class="icon-btn" onclick="openEditMonthly('+r.row+')" title="Sửa">✏️</button>':'<span class="sc-lock" style="font-size:12px">🔒</span>')

      +'</div>';
  });
  h+='</div>';
  $("tab-month").innerHTML=h;
}
function mrFormatText(t){
  var s=esc(String(t||""));
  s=s.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:var(--mmh-blue);word-break:break-all">$1</a>');
  s=s.replace(/^([^\n:]{1,40}:)/gm,'<b>$1</b>');
  s=s.replace(/\n/g,'<br>');
  return s;
}

/* ══════════════════════════════════════════════════════════════════════════════
   TAB: REPORT — RULE MỚI
   ────────────────────────────────────────────────────────────────────────────
   Tuần này  : task active trong tuần [from,to] (start/deadline/actual trong tuần,
               hoặc In Progress). Hiển thị cột Kết quả.
   Tuần sau  : cửa sổ +7. Lấy task CHƯA hoàn thành (không Completed/Cancelled) mà
               start nằm chính tuần sau HOẶC deadline hiệu lực >= đầu tuần sau
               (tuần sau hoặc xa hơn) HOẶC còn đang mở. KHÔNG hiển thị cột Kết quả.
   ══════════════════════════════════════════════════════════════════════════════ */
/* Chọn tuần báo cáo — mặc định tuần hiện tại (T2→T7). Điều hướng ‹ › theo tuần. */
function reportShiftWeek(dir){
  var f=new Date(S.reportFrom+"T00:00:00"), t=new Date(S.reportTo+"T00:00:00");
  f.setDate(f.getDate()+dir*7); t.setDate(t.getDate()+dir*7);
  S.reportFrom=toISO(f); S.reportTo=toISO(t); renderReport();
}
function reportThisWeek(){ var mon=mondayOf(new Date()); var sat=new Date(mon); sat.setDate(mon.getDate()+5); S.reportFrom=toISO(mon); S.reportTo=toISO(sat); renderReport(); }

function renderReport(){
  if(!S.reportFrom||!S.reportTo){ var mon=mondayOf(new Date()); var sat=new Date(mon); sat.setDate(mon.getDate()+5); S.reportFrom=toISO(mon); S.reportTo=toISO(sat); }
  var tFrom=S.reportFrom, tTo=S.reportTo;
  var nFrom=addDaysISO(tFrom,7), nTo=addDaysISO(tTo,7);

  function applyFilter(arr){
    if(S.reportTypes.length) arr=arr.filter(function(o){ return S.reportTypes.indexOf(o.k.type)>=0; });
    if(S.reportPics.length)  arr=arr.filter(function(o){ return S.reportPics.indexOf(o.s.pic)>=0; });
    return arr;
  }
  function filterThis(){
    return applyFilter(allSubs().filter(function(o){
      var s=o.s, eff=s.revised||s.planned||"";
      var inW=function(d){ return d && String(d).slice(0,10)>=tFrom && String(d).slice(0,10)<=tTo; };
      return inW(s.start)||inW(eff)||inW(s.actual)||isInProgress(s.status);
    }));
  }
  function filterNext(){
    return applyFilter(allSubs().filter(function(o){
      var s=o.s, eff=s.revised||s.planned||"";
      if(isDone(s.status)||isCancelled(s.status)) return false;
      var inW=function(d){ return d && String(d).slice(0,10)>=nFrom && String(d).slice(0,10)<=nTo; };
      var startInNext=inW(s.start);
      var effAtOrAfter=eff && String(eff).slice(0,10)>=nFrom;
      var stillOpen=isInProgress(s.status)||/to\s*do/i.test(s.status);
      return startInNext||effAtOrAfter||stillOpen;
    }));
  }
  var tSubs=filterThis(), nSubs=filterNext();

  var allKts=allKeyTasks();
  var types=[...new Set(allKts.map(function(k){return k.type;}).filter(Boolean))].sort();
  var picsAll=picListAll();

  var h="";
  // Toolbar: chọn tuần + gửi
  h+='<div class="report-toolbar">'
    +'<div class="gantt-nav">'
      +'<button class="gnav-btn" onclick="reportShiftWeek(-1)" title="Tuần trước"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>'
      +'<span class="gnav-label" style="min-width:190px">'+fmtVNFull(tFrom)+' – '+fmtVNFull(tTo)+'</span>'
      +'<button class="gnav-btn" onclick="reportShiftWeek(1)" title="Tuần sau"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>'
      +'<button class="gnav-today" onclick="reportThisWeek()">Tuần này</button>'
    +'</div>'
    +'<span style="flex:1"></span>'
    +'<button class="btn-primary" onclick="openReportSend()"><svg viewBox="0 0 24 24"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>Tạo PDF &amp; gửi (gộp 2 phần)</button>'
    +'</div>';
  // Bộ lọc PIC + Type (multi-select) — dùng chung component với Chi tiết nhưng prefix report
  h+='<div class="rp-filter-bar">'
    +reportFilterDropdown("type","Loại công việc",types,S.reportTypes)
    +reportFilterDropdown("pic","PIC phụ trách",picsAll,S.reportPics)

function toggleReportFilter(kind,val){ var arr=kind==='type'?S.reportTypes:S.reportPics; var i=arr.indexOf(val); if(i>=0)arr.splice(i,1); else arr.push(val); renderReport(); }
function clearReportFilter(kind){ if(kind==='type')S.reportTypes=[]; else S.reportPics=[]; renderReport(); }

/* view report GỌN, khác Chi tiết: 1 bảng phẳng, gộp theo key, có thanh % ngang */
function reportSection(subs, isNext){
  var showResult=!isNext;
  if(!subs.length) return '<div class="rp-empty">'+(isNext?'🗓️ Không có việc dự kiến tuần sau (theo bộ lọc).':'📄 Không có việc trong tuần này (theo bộ lọc).')+'</div>';
  var byKey={};
  subs.forEach(function(o){ (byKey[o.k.no]=byKey[o.k.no]||{k:o.k,items:[]}).items.push(o.s); });
  var h='<div class="rp-table-wrap"><table class="rp-table">';
  h+='<thead><tr>'
    +'<th class="rp-c-task">Sub Task</th>'
    +'<th class="rp-c-pic">PIC</th>'
    +'<th class="rp-c-dl">Deadline</th>'
    +'<th class="rp-c-prog">Tiến độ</th>'
    +'<th class="rp-c-st">Trạng thái</th>'
    +(showResult?'<th class="rp-c-res">Kết quả / Link</th>':'')
    +'</tr></thead><tbody>';
  Object.keys(byKey).forEach(function(kn){
    var b=byKey[kn], c=typeColor(b.k.type);
    var colspan = showResult?6:5;
    h+='<tr class="rp-keyrow"><td colspan="'+colspan+'">'
      +'<span class="rp-key-tag" style="background:'+c+'20;color:'+c+'">'+esc(b.k.type||'')+'</span>'
      +'<span class="rp-key-name">'+esc(b.k.no)+' · '+esc(b.k.keyTask)+'</span>'
      +'<span class="rp-key-pct" style="color:'+c+'">'+ktProgress(b.k)+'%</span>'
      +'</td></tr>';
    b.items.forEach(function(s){
      var sm=stMeta(s.status), eff=s.revised||s.planned, pct=subPct(s);
      h+='<tr class="rp-subrow" onclick="openEdit(\''+jsq(b.k.no)+'\',\''+jsq(s.no)+'\')">'
        +'<td class="rp-c-task"><span class="rp-sub-no">'+esc(s.no)+'</span>'+esc(s.name||s.subTask)+'</td>'
        +'<td class="rp-c-pic"><span class="rp-pic-av" style="background:'+avColor(s.pic)+'">'+esc(initials(s.pic))+'</span>'+esc(s.pic||'—')+'</td>'
        +'<td class="rp-c-dl">'+(eff?fmtVN(eff):'—')+'</td>'
        +'<td class="rp-c-prog"><span class="rp-bar"><span class="rp-bar-fill" style="width:'+pct+'%;background:'+sm.dot+'"></span></span><span class="rp-bar-pct">'+pct+'%</span></td>'
        +'<td class="rp-c-st"><span class="tc-status '+sm.cls+'">'+sm.lbl+'</span></td>'
        +(showResult?'<td class="rp-c-res">'+(s.result?linkify(s.result):'<span style="color:var(--faint)">—</span>')+'</td>':'')
        +'</tr>';
    });
  });
  h+='</tbody></table></div>';
  return h;
}

function showModal(html){ $("modals").innerHTML='<div class="modal-overlay show" id="m-active" onclick="if(event.target===this)closeModal()">'+html+'</div>'; }

/* helper: khối chọn Status + slider % (dùng chung Edit/Add) */
function statusSelectHtml(id, current){
  return '<select id="'+id+'" onchange="onStatusChange(this.value)">'+
    S.statusOptions.map(function(o){return '<option'+(o===current?" selected":"")+'>'+esc(o)+'</option>';}).join("")+'</select>';
}
function progFieldHtml(id, value, status){
  var show = /progress/i.test(status||"");
  var v = parseInt(value,10); if(isNaN(v)) v=0;
  return '<div class="prog-field'+(show?' show':'')+'" id="prog-wrap">'
    +'<div class="prog-field-top"><label>% Tiến độ (kéo thanh)</label><span class="prog-field-val" id="prog-val">'+v+'%</span></div>'
    +'<input type="range" min="0" max="100" step="5" value="'+v+'" class="prog-slider" id="'+id+'" oninput="$(\'prog-val\').textContent=this.value+\'%\'"/>'

}
/* bật/tắt slider khi đổi status */
function onStatusChange(v){
  var wrap=$("prog-wrap"); if(!wrap) return;
  if(/progress/i.test(v)){ wrap.classList.add("show"); }
  else{
    wrap.classList.remove("show");
    var sl=wrap.querySelector(".prog-slider");
    if(sl){ var pv= /complet/i.test(v)?100:0; sl.value=pv; $("prog-val").textContent=pv+"%"; }
  }
}
function readProg(){
  var sl=document.querySelector("#prog-wrap .prog-slider");
  return sl ? parseInt(sl.value,10) : 0;
}

    +'<div class="field"><label>Deadline dự kiến</label><input id="e-planned" type="date" value="'+esc(item.planned||"")+'"/></div></div>'
    +'<div class="field"><label>Deadline dời (Revised) <small style="color:var(--faint)">(nếu có)</small></label><input id="e-revised" type="date" value="'+esc(item.revised||"")+'"/></div>'
    +'<div class="field"><div class="field-label-row"><label>Kết quả / Link / Ghi chú</label><button class="voice-btn" onclick="toggleVoice(\'e-result\',this)">🎤 Nói</button></div>'
    +'<textarea id="e-result" placeholder="VD: Link Drive, ghi chú kết quả bàn giao…">'+esc(item.result||"")+'</textarea></div>'
    +'<div class="field-hint">Hoàn thành thực tế (P) &amp; Leadtime (M) do công thức Sheet tự điền khi status = Completed. % tiến độ lưu ở cột O.</div>'
    +'</div>'

    +'<button class="btn-secondary" onclick="closeModal()">Đóng</button>'
    +'<button class="btn-primary" onclick="saveEdit('+isSub+')">💾 Lưu cập nhật</button></div></div></div>';
  showModal(html);
}
function saveEdit(isSub){
  var ctx=S.editCtx; if(!ctx)return;
  var status=$("e-status").value;
  var updates={ status:status, start:$("e-start").value, planned:$("e-planned").value,
    revised:$("e-revised").value, result:$("e-result").value, progress:readProg() };
  if(isManager()){ updates[isSub?"name":"keyTask"]=$("e-name").value; if($("e-pic")) updates.pic=$("e-pic").value; }
  overlay(true,"Đang lưu","Ghi vào Google Sheet…");
  apiPost({action: isSub?"updateSub":"updateKey", row:ctx.row, updates:updates})
    .then(function(){
      // cập nhật cục bộ item đang sửa
      var item = ctx.sno ? findSub(ctx.kno,ctx.sno) : findKey(ctx.kno);
      if(item){
        item.status=updates.status; item.start=updates.start; item.planned=updates.planned;
        item.revised=updates.revised; item.result=updates.result;
        item.progress=pctLocal(updates.progress, updates.status);
        if(isManager()){ if(isSub){item.name=updates.name;item.subTask=updates.name;} else item.keyTask=updates.keyTask; if(updates.pic)item.pic=updates.pic; }
      }
      overlay(false); closeModal(); toast("✓ Đã cập nhật"); rerenderActive(); reloadSoft();
    })
    .catch(function(e){ overlay(false); toast("⚠️ "+e.message); });
}

    +keyField
    +'<div class="field"><label>Tên Sub Task</label><input id="s-name" type="text" placeholder="VD: Chuẩn bị tài liệu trình bày"/></div>'

    +'<div class="field"><label>Trạng thái</label>'+statusSelectHtml("s-status","To Do")+'</div></div>'
    +progFieldHtml("s-progress", 0, "To Do")
    +'<div class="field-row"><div class="field"><label>Bắt đầu</label><input id="s-start" type="date" value="'+today+'"/></div>'
    +'<div class="field"><label>Deadline dự kiến</label><input id="s-planned" type="date" value="'+today+'"/></div></div>'
    +'<div class="field-hint">Sub-task mới chèn ngay dưới sub-task cuối của Key Task này.</div>'

    +'</div></div>';

function saveAddSub(kno){
  var parent = kno;
  if(!parent){
    var raw = ($("s-key") && $("s-key").value || "").trim();
    parent = raw.split("·")[0].trim();
    if((parent && isNaN(parseInt(parent,10))) || !findKey(parent)){
      var hit=allKeyTasks().filter(function(x){ return (x.no+' · '+x.keyTask)===raw || x.keyTask===raw; })[0];
      if(hit) parent=hit.no;
    }
  }
  if(!parent || !findKey(parent)){ toast("Chọn Key Task hợp lệ từ danh sách"); return; }
  var name=$("s-name").value.trim(); if(!name){ toast("Nhập tên Sub Task"); return; }
  var payload={action:"addSub", parentNo:parent, name:name, pic:$("s-pic").value,
    start:$("s-start").value, planned:$("s-planned").value, status:$("s-status").value, progress:readProg()};
  overlay(true,"Đang thêm","Ghi Sub Task vào Sheet…");
  apiPost(payload)
  .then(function(r){
    // cập nhật CỤC BỘ ngay để hiện real-time (không chờ reload)
    var k=findKey(parent);
    if(k){
      k.subs=k.subs||[];
      var newNo = r.no || (parent+"."+((k.subs.length||0)+1));
      k.subs.push({ row:r.row||0, no:newNo, name:name, subTask:name, pic:payload.pic,
        status:payload.status, progress:pctLocal(payload.progress,payload.status),
        start:payload.start, planned:payload.planned, revised:"", result:"", actual:"", type:k.type });
    }
    overlay(false); closeModal(); S.detailOpen[parent]=true;
    toast("✓ "+(r.message||"Đã thêm sub-task"));
    rerenderActive();
    reloadSoft(); // đồng bộ nền, không chặn
  })
  .catch(function(e){ overlay(false); toast("⚠️ "+e.message); });
}
/* % cục bộ suy theo status khi thêm mới (cho hiển thị ngay) */
function pctLocal(p,status){
  if(/complet/i.test(status)) return 100;
  if(/cancel/i.test(status)||/to\s*do/i.test(status)) return 0;
  var n=parseInt(p,10); return isNaN(n)?0:n;
}

/* ── DELETE ── */
function delRow(no,row,isKey){
  if(!confirm(isKey?"Xoá Key Task "+no+" và toàn bộ sub-task?":"Xoá dòng "+no+"?")) return;
  overlay(true,"Đang xoá","Xoá khỏi Sheet…");
  apiPost({action:"deleteRow", row:row})
    .then(function(r){
      // xóa cục bộ ngay
      if(isKey){ S.keyTasks=S.keyTasks.filter(function(k){return k.no!==no;}); }
      else { S.keyTasks.forEach(function(k){ if(k.subs) k.subs=k.subs.filter(function(s){return s.no!==no;}); }); }
      overlay(false); toast("✓ "+(r.message||"Đã xoá")); rerenderActive(); reloadSoft();
    })
    .catch(function(e){ overlay(false); toast("⚠️ "+e.message); });
}

/* ── ASSIGN (CHỈ MANAGER) ── */
var AS = { key:"", pic:"", checked:{} };
function openAssign(kno,sno){
  if(!isManager()){ toast("Chỉ quản lý được nhắc việc / giao việc"); return; }
  AS = { key: kno || "", pic: "", checked: {} };
  if(kno){
    var k=findKey(kno);
    if(sno){ var sub=findSub(kno,sno); if(sub){ AS.pic=sub.pic||k.pic||""; AS.checked[sno]=true; } }
    else { AS.pic = k? (k.pic||"") : ""; }
  }
  renderAssignModal();
}
function renderAssignModal(){
  var keyOpts='<option value="">— Chọn Key Task —</option>'+allKeyTasks().map(function(k){
    return '<option value="'+esc(k.no)+'"'+(k.no===AS.key?" selected":"")+'>'+esc(k.no)+' · '+esc(k.keyTask)+'</option>';
  }).join("");
  var picsInKey = [];
  if(AS.key){
    var kk=findKey(AS.key);
    (kk && kk.subs || []).forEach(function(s){ if(s.pic && picsInKey.indexOf(s.pic)<0) picsInKey.push(s.pic); });
  }
  if(!picsInKey.length) picsInKey = S.pics.slice();
  var picOpts='<option value="">— Chọn PIC —</option>'+picsInKey.map(function(p){
    return '<option value="'+esc(p)+'"'+(p===AS.pic?" selected":"")+'>'+esc(p)+'</option>';
  }).join("");

  var subsHtml='', subs=[];
  if(AS.key && AS.pic){
    var kx=findKey(AS.key);
    subs=(kx&&kx.subs||[]).filter(function(s){ return s.pic===AS.pic; });
    if(!subs.length){
      subsHtml='<div class="as-empty">PIC này chưa có sub-task nào trong Key Task đã chọn.</div>';
    } else {
      var allChecked = subs.every(function(s){ return AS.checked[s.no]; });
      subsHtml='<div class="as-selall"><label class="as-check"><input type="checkbox" '+(allChecked?"checked":"")+' onclick="asToggleAll(this.checked)"/> <b>Chọn tất cả ('+subs.length+')</b></label></div>';
      subsHtml+='<div class="as-list">'+subs.map(function(s){
        var eff=s.revised||s.planned||"";
        var m=stMeta(s.status);
        return '<div class="as-item">'+
          '<label class="as-check"><input type="checkbox" '+(AS.checked[s.no]?"checked":"")+' onclick="asToggleOne(\''+jsq(s.no)+'\',this.checked)"/>'+
            '<span class="as-item-name">'+esc(s.name||s.subTask)+'</span></label>'+
          '<span class="as-item-status '+m.cls+'">'+m.lbl+'</span>'+
          '<input class="as-item-dl" type="date" value="'+esc(toISO(eff)||"")+'" data-no="'+esc(s.no)+'" title="Hạn (sửa được)"/>'+
        '</div>';
      }).join("")+'</div>';
    }
  }

  var nCheck=Object.keys(AS.checked).filter(function(k){return AS.checked[k];}).length;
  var html='<div class="modal-box modal-lg"><div class="modal-head"><h3>Nhắc việc / Giao việc</h3><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-body">'
    +'<div class="field-row">'
      +'<div class="field"><label>Key Task</label><select id="as-key" onchange="asPickKey(this.value)">'+keyOpts+'</select></div>'
      +'<div class="field"><label>Gửi cho PIC</label><select id="as-pic" onchange="asPickPic(this.value)"'+(AS.key?"":" disabled")+'>'+picOpts+'</select></div>'
    +'</div>'
    +(AS.key&&AS.pic ? '<div class="field"><label>Chọn sub-task để nhắc</label>'+subsHtml+'</div>' : '<div class="as-empty">Chọn Key Task rồi chọn PIC để hiện danh sách sub-task.</div>')
    +'<div class="field"><div class="field-label-row"><label>Ghi chú chung (tuỳ chọn)</label><button class="voice-btn" onclick="toggleVoice(\'as-note\',this)">🎤 Nói</button></div>'
      +'<textarea id="as-note" placeholder="VD: Ưu tiên hoàn thành trước sự kiện. Gửi bản nháp để duyệt…"></textarea></div>'
    +'<div class="field-hint">Email công sở (1 email gộp các sub-task đã chọn) gửi tới PIC, CC bạn. Hạn từng dòng lấy từ Sheet, có thể sửa tay.</div>'
    +'<div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Hủy</button>'
    +'<button class="btn-primary" '+(nCheck?"":"disabled")+' onclick="submitAssign()">Gửi nhắc việc'+(nCheck?" ("+nCheck+")":"")+'</button></div>'
    +'</div></div>';
  showModal(html);
}
function asPickKey(v){ AS.key=v; AS.pic=""; AS.checked={}; renderAssignModal(); }
function asPickPic(v){ AS.pic=v; AS.checked={}; renderAssignModal(); }
function asToggleOne(no,on){ AS.checked[no]=on; renderAssignModal(); }
function asToggleAll(on){
  var kx=findKey(AS.key); var subs=(kx&&kx.subs||[]).filter(function(s){return s.pic===AS.pic;});
  AS.checked={}; if(on) subs.forEach(function(s){ AS.checked[s.no]=true; });
  renderAssignModal();
}
function submitAssign(){
  if(!isManager()){ toast("Chỉ quản lý được giao việc"); return; }
  var kx=findKey(AS.key); if(!kx){ toast("Chọn Key Task"); return; }
  var subs=(kx.subs||[]).filter(function(s){return s.pic===AS.pic;});
  var dlMap={};
  document.querySelectorAll(".as-item-dl").forEach(function(inp){ dlMap[inp.getAttribute("data-no")]=inp.value; });
  var items=subs.filter(function(s){return AS.checked[s.no];}).map(function(s){
    return { no:s.no, name:(s.name||s.subTask), deadline:(dlMap[s.no]||s.revised||s.planned||"") };
  });
  if(!items.length){ toast("Chọn ít nhất 1 sub-task"); return; }
  var note=($("as-note")&&$("as-note").value||"").trim();
  overlay(true,"Đang gửi","Gửi email nhắc việc…");
  apiPost({action:"assign", toPic:AS.pic, items:items, note:note})
    .then(function(r){ overlay(false); closeModal(); toast("✓ "+(r.message||"Đã gửi")); })
    .catch(function(e){ overlay(false); toast("⚠️ "+e.message); });
}

/* ══════════════ VOICE ══════════════ */
var _rec=null,_recTarget=null,_recBtn=null;
function toggleVoice(id,btn){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast("Trình duyệt không hỗ trợ voice-to-text"); return; }
  if(_rec){ stopVoice(); return; }
  _rec=new SR(); _rec.lang="vi-VN"; _rec.continuous=true; _rec.interimResults=true;
  _recTarget=$(id); _recBtn=btn;
  var base=_recTarget.value?(_recTarget.value+" "):"";
  btn.classList.add("rec"); btn.textContent="⏺ Đang nghe…";
  _rec.onresult=function(e){ var t=""; for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript; _recTarget.value=base+t; };
  _rec.onend=stopVoice; _rec.onerror=stopVoice;
  try{_rec.start();}catch(e){}
}
function stopVoice(){ if(_rec){try{_rec.stop();}catch(e){}_rec=null;} if(_recBtn){_recBtn.classList.remove("rec");_recBtn.textContent="🎤 Nói";_recBtn=null;} _recTarget=null; }

/* ══════════════ RELOAD ══════════════ */
function reload(){
  return apiGet("boot").then(function(res){
    if(res.keyTasks) S.keyTasks=res.keyTasks;
    if(res.monthly) S.monthly=res.monthly;
  });
}
/* reload nền: đồng bộ dữ liệu thật từ sheet, KHÔNG hiện overlay, im lặng nếu lỗi.
 * Giữ lại trạng thái mở/đóng panel. Có timeout để không treo. */
var _softReloading=false;
function reloadSoft(){
  if(_softReloading) return;
  _softReloading=true;
  apiGet("boot").then(function(res){
    if(res.keyTasks) S.keyTasks=res.keyTasks;
    if(res.monthly) S.monthly=res.monthly;
    _softReloading=false;
    rerenderActive();
  }).catch(function(){ _softReloading=false; /* im lặng: bản cục bộ vẫn hiển thị */ });
}
function rerenderActive(){
  if(S.tab==="overview") renderOverview();
  else if(S.tab==="gantt") renderGantt();
  else if(S.tab==="detail") renderDetail();
  else if(S.tab==="month") renderMonth();
  else if(S.tab==="report") renderReport();
}
document.addEventListener("keydown",function(e){ if(e.key==="Escape"&&$("m-active")) closeModal(); });
