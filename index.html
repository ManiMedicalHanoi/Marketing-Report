    +flipCard('prog',    inprog.length,  'Đang thực hiện', '🔵','c-prog2', inprog)
    +flipCard('over',    overdue.length, 'Quá hạn',        '🔴','c-over', overdue)
    +'</div>';
  if(!pfilter){
    /* ⭐ v5.2: chỉ hiện nhân sự CÓ việc trong kỳ → lưới gọn, hết rối */
    var picStats={};
    pics.forEach(function(p){ picStats[p]=[]; });
    kts.forEach(function(k){ (k.subs||[]).forEach(function(s){
      var p=picOf(s);
      if(!picStats[p]) return;                       // bỏ PIC rác / chưa gán
      if(selP.length && selP.indexOf(p)<0) return;
      if(subInRange(s,from,to)) picStats[p].push({k:k,s:s});
    });});
    var shownPics=pics.filter(function(p){ return picStats[p].length>0; })
                      .sort(function(a,b){ return picStats[b].length-picStats[a].length; });
    h+='<div class="section-title"><h2>Hiệu suất theo nhân sự</h2><span class="hint">'+shownPics.length+' người có việc trong kỳ · bấm để xem chi tiết</span></div>';
    if(!shownPics.length) h+='<div class="empty"><div class="ic">👥</div><p>Không có nhân sự nào có việc trong khoảng đã chọn.</p></div>';
    h+='<div class="cell-grid perf-grid" style="grid-template-columns:repeat(auto-fill,minmax(270px,1fr))">';
    shownPics.forEach(function(p){
      var ps=picStats[p];
      var active=ps.filter(function(o){return !isCancelled(o.s.status);});
      var doneList=active.filter(function(o){return isDone(o.s.status);});
      var progList=active.filter(function(o){return isInProgress(o.s.status);});
      var todoList=active.filter(function(o){return /to\s*do/i.test(o.s.status)||!o.s.status;});
      var pdone=doneList.length;
      var rate=active.length?Math.round(pdone/active.length*100):0;
      var c=avColor(p);
      function doneRows(){
        if(!doneList.length) return '<div class="pf-empty">Chưa có việc hoàn thành</div>';
        return doneList.slice(0,8).map(function(o){
          var when = o.s.actual ? fmtVN(o.s.actual) : (effDate(o.s)?fmtVN(effDate(o.s)):'—');
          return '<div class="pf-line"><span class="pf-dot" style="background:#22c55e"></span><span class="pf-nm">'+esc(o.s.name||o.s.subTask)+'</span><span class="pf-when">'+esc(when)+'</span></div>';

      var hoverBox='<div class="pf-box">'

        +'<div class="pf-stats">'
          +'<div class="pf-stat"><b style="color:#1E6B3A">'+doneList.length+'</b><span>Hoàn thành</span></div>'
          +'<div class="pf-stat"><b style="color:#2563eb">'+progList.length+'</b><span>Đang làm</span></div>'
          +'<div class="pf-stat"><b style="color:#64748b">'+todoList.length+'</b><span>Chờ (To Do)</span></div>'
        +'</div>'
        +'<div class="pf-sec-t">✅ Đã hoàn thành <small>(việc · ngày xong)</small></div><div class="pf-list">'+doneRows()+'</div>'
        +'<div class="pf-sec-t">🔵 Đang thực hiện</div><div class="pf-list">'+listRows(progList,'#3b82f6')+'</div>'
        +'<div class="pf-sec-t">⚪ Đã lên kế hoạch (To Do)</div><div class="pf-list">'+listRows(todoList,'#94a3b8')+'</div>'
      +'</div>';
      h+='<div class="task-cell perf-cell" style="cursor:pointer" onclick="setOverviewPic(\''+jsq(p)+'\')">'
        +'<div class="tc-pic"><span class="tc-pic-av" style="background:'+c+'">'+esc(initials(p))+'</span><b style="font-size:14.5px;color:var(--text)">'+esc(p)+'</b>'
        +(S.managers.indexOf(p)>=0?'<span style="margin-left:auto;font-size:10px;color:var(--warn-fg);background:var(--warn-bg);padding:2px 8px;border-radius:8px;font-weight:700">⭐ QL</span>':'')+'</div>'

        +'<div class="tc-progbar"><div class="tc-progfill" style="width:'+rate+'%;background:'+c+'"></div></div>'
        +'<div class="tc-bottom"><span>🔵 '+progList.length+' · ⚪ '+todoList.length+'</span><span style="font-weight:800;color:'+c+'">'+rate+'%</span></div>'

    });
    h+='</div>';
    h+='<div class="section-title"><h2>Phân bổ theo loại công việc</h2></div>';
    var done=total.filter(function(o){return isDone(o.s.status);}).length;
    var prog2=total.filter(function(o){return isInProgress(o.s.status);}).length;
    var todo=total.filter(function(o){return /to\s*do/i.test(o.s.status)||!o.s.status;}).length;
    var cancel=pool.filter(function(o){return isCancelled(o.s.status);}).length;
    h+='<div class="grid2">';
    h+='<div class="panel panel-pad"><h3>Key Task theo Type</h3>'+barsHTML(groupCount(kts,function(k){return k.type||"(khác)";}))+'</div>';
    h+='<div class="panel panel-pad"><h3>Sub-task theo trạng thái (trong kỳ)</h3>'
      +donutHTML([["Completed",done,"#22c55e"],["In Progress",prog2,"#3b82f6"],["To Do",todo,"#94a3b8"],["Cancelled",cancel,"#b8b2c2"]], total.length, "việc")
      +'</div>';
    h+='</div>';
  } else {
    h+='<div class="section-title"><h2>Công việc của '+esc(pfilter)+' <span style="font-size:12.5px;color:var(--faint);font-weight:600">— bấm sub-task để sửa</span></h2>'
      +'<span class="sp"></span><button class="btn-secondary" onclick="setOverviewPic(\'\')">← Tất cả PIC</button></div>';
    var myKeys=kts.filter(function(k){ return (k.subs||[]).some(function(s){return picOf(s)===pfilter && subInRange(s,from,to);}) || (picOf(k)===pfilter && keyInRange(k,from,to)); });
    if(!myKeys.length){ h+='<div class="empty"><div class="ic">📭</div><p>'+esc(pfilter)+' không có việc trong khoảng đã chọn.</p></div>'; }
    else h+=detailKeyPanels(myKeys, from, to, pfilter);
  }
  $("tab-overview").innerHTML=h;
}

/* ⭐ #1 NÂNG CẤP: từ bất kỳ chỗ nào bấm task → mở tab Chi tiết, mở panel key,
   MỞ LUÔN comment/edit của sub, cuộn lên đầu & bôi màu nhạt để biết chỗ edit. */
function gotoSub(kno,sno){
  switchTab('detail');
  setTimeout(function(){
    // đảm bảo panel key mở
    S.detailOpen[kno]=true;
    if(sno) S.detailOpen["sub_"+sno]=true;   // mở luôn phần comment/kết quả để sửa
    // nếu sub nằm ngoài khoảng lọc thời gian → hiện tất cả sub để không bị ẩn
    S.detailShowAllSubs[kno]=true;
    renderDetail();
    setTimeout(function(){ scrollHighlight(kno,sno); },60);
  },70);
}
/* Mở + cuộn + highlight cho 1 key/sub bất kỳ */
function scrollHighlight(kno,sno){
  var el = sno ? document.getElementById('sub-'+sno) : null;
  var kpanel = keyPanelEl(kno);
  var target = el || kpanel;
  if(!target){ return; }
  // cuộn để phần cần sửa lên gần đầu (chừa chỗ cho topbar sticky)
  var y = target.getBoundingClientRect().top + window.pageYOffset - 90;
  window.scrollTo({ top: y<0?0:y, behavior:'smooth' });
  // bôi màu nhạt
  if(el){
    el.classList.add('edit-highlight');
    setTimeout(function(){ el.classList.remove('edit-highlight'); }, 2600);
  } else if(kpanel){
    kpanel.classList.add('edit-highlight');
    setTimeout(function(){ kpanel.classList.remove('edit-highlight'); }, 2600);
  }
}
/* tìm phần tử panel của 1 key theo data-attr */
function keyPanelEl(kno){
  var panels=document.querySelectorAll('.kt-panel[data-kno]');
  for(var i=0;i<panels.length;i++){ if(panels[i].getAttribute('data-kno')===String(kno)) return panels[i]; }
  return null;
}
function kpiCard(val,label,ic,cls){
  return '<div class="kpi-card '+(cls||"")+'"><div class="kpi-ic">'+ic+'</div><div class="kpi-val">'+val+'</div><div class="kpi-label">'+esc(label)+'</div></div>';
}
function groupCount(rows,fn){ var m={}; rows.forEach(function(r){ var k=fn(r)||"(khác)"; m[k]=(m[k]||0)+1; }); return Object.keys(m).map(function(k){return[k,m[k]];}).sort(function(a,b){return b[1]-a[1];}); }
function donutHTML(entries,centerLabel,centerSub){
  var total=entries.reduce(function(a,e){return a+e[1];},0);
  if(!total) return '<p style="color:var(--faint);font-size:13px;text-align:center;padding:20px">Chưa có dữ liệu</p>';
  var R=52, C=2*Math.PI*R, off=0;
  var segs=entries.filter(function(e){return e[1]>0;}).map(function(e){
    var frac=e[1]/total, len=frac*C;
    var seg='<circle cx="70" cy="70" r="'+R+'" fill="none" stroke="'+e[2]+'" stroke-width="20" '
      +'stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 70 70)" '
      +'style="transition:stroke-dashoffset .6s"><title>'+esc(e[0])+': '+e[1]+' ('+Math.round(frac*100)+'%)</title></circle>';
    off+=len; return seg;
  }).join("");
  var legend=entries.filter(function(e){return e[1]>0;}).map(function(e){
    return '<div class="donut-lg"><span class="donut-dot" style="background:'+e[2]+'"></span>'
      +'<span class="donut-lg-name">'+esc(e[0])+'</span>'
      +'<span class="donut-lg-val">'+e[1]+' <small>· '+Math.round(e[1]/total*100)+'%</small></span></div>';
  }).join("");
  return '<div class="donut-wrap"><div class="donut-svg"><svg viewBox="0 0 140 140" width="150" height="150">'
    +'<circle cx="70" cy="70" r="52" fill="none" stroke="var(--lb3)" stroke-width="20"/>'+segs
    +'</svg><div class="donut-center"><div class="donut-c-val">'+esc(centerLabel)+'</div><div class="donut-c-sub">'+esc(centerSub||"")+'</div></div></div>'
    +'<div class="donut-legend">'+legend+'</div></div>';
}
function barsHTML(entries){
  if(!entries.length) return '<p style="color:var(--faint);font-size:13px">Chưa có dữ liệu</p>';
  var max=Math.max.apply(null,entries.map(function(e){return e[1];}))||1;
  var total=entries.reduce(function(a,e){return a+e[1];},0)||1;
  return '<div class="bars">'+entries.map(function(e){
    var p=Math.round(e[1]/max*100);
    var share=Math.round(e[1]/total*100);
    var color=typeColor(e[0]);
    return '<div class="bar-row" title="'+esc(e[0])+': '+e[1]+' ('+share+'%)">'
      +'<div class="bar-top"><span class="bar-name">'+esc(e[0])+'</span>'
      +'<span class="bar-val" style="color:'+color+'">'+e[1]+' <small style="color:var(--faint);font-weight:600">· '+share+'%</small></span></div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+p+'%;background:'+color+'"></div></div></div>';
  }).join("")+'</div>';
}

function ganttToggleKey(no){ S.ganttOpen[no]=!S.ganttOpen[no]; renderGantt(); }

/* ⭐ Cột Gantt theo đơn vị: day | week | month */
function ganttColumns(R, unit){
  var cols=[];
  var DOW=["CN","T2","T3","T4","T5","T6","T7"];
  if(unit==="month"){
    var cur=new Date(R.start.getFullYear(), R.start.getMonth(), 1);
    var endM=new Date(R.end.getFullYear(), R.end.getMonth(), 1);
    while(cur<=endM){
      var first=new Date(cur.getFullYear(), cur.getMonth(), 1);
      var last =new Date(cur.getFullYear(), cur.getMonth()+1, 0);
      cols.push({ from:toISO(first), to:toISO(last),
                  label:("0"+(cur.getMonth()+1)).slice(-2), sub:String(cur.getFullYear()).slice(2), weekend:false });
      cur=new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    }
    return cols;
  }
  if(unit==="week"){
    var w=mondayOf(R.start);
    while(w<=R.end){
      var wEnd=new Date(w); wEnd.setDate(w.getDate()+6);
      cols.push({ from:toISO(w), to:toISO(wEnd),
                  label:(w.getDate()+"/"+(w.getMonth()+1)), sub:"Tuần", weekend:false });
      w=new Date(w); w.setDate(w.getDate()+7);
    }
    return cols;
  }
  // day (mặc định)
  var d=new Date(R.start);
  while(d<=R.end){
    var dow=d.getDay();
    cols.push({ from:toISO(d), to:toISO(d),
                label:String(d.getDate()), sub:DOW[dow], weekend:(dow===0||dow===6) });
    d=new Date(d); d.setDate(d.getDate()+1);
  }
  return cols;
}
function trackCells(cols){
  return cols.map(function(c){ return '<div class="gantt-tcell'+(c.weekend?' wknd':'')+'"></div>'; }).join("");
}
function setGanttUnit(u){ S.ganttUnit=u; renderGantt(); }
function ganttToggleSub(sno){ S.ganttOpenSub[sno]=!S.ganttOpenSub[sno]; renderGantt(); }
function clearGanttSearch(){ S.ganttQ=""; S._ganttFocus=true; renderGantt(); }
/* Gantt range: mở rộng giới hạn khi xem theo tuần/tháng */
function ganttRange(){
  var start=new Date(S.dateFrom+"T00:00:00"); start.setHours(0,0,0,0);
  var end=new Date(S.dateTo+"T00:00:00"); end.setHours(0,0,0,0);
  if(end<start){ var t=start; start=end; end=t; }
  var days=Math.round((end-start)/86400000)+1;
  var unit=S.ganttUnit||"day";
  var maxDays = (unit==="month") ? 730 : (unit==="week" ? 365 : 62);
  if(days>maxDays){ end=new Date(start); end.setDate(start.getDate()+maxDays-1); }
  var today=new Date(); today.setHours(0,0,0,0);
  return { start:start, end:end, days:days, today:today };
}
function renderGantt(){
  var kts=allKeyTasks();
  var types=[...new Set(kts.map(function(k){return k.type;}).filter(Boolean))];
  if(S.ganttType) kts=kts.filter(function(k){return k.type===S.ganttType;});
  // ⭐ SMART SEARCH: lọc theo key/sub/PIC/type (không re-render ô input → không mất focus)
  var gq=(S.ganttQ||"").trim().toLowerCase();
  if(gq){
    kts=kts.filter(function(k){
      var hay=(k.keyTask||"")+" "+(k.type||"")+" "+(k.pic||"")+" "+(k.no||"")+" "+
              (k.subs||[]).map(function(x){return (x.name||x.subTask||"")+" "+(x.pic||"")+" "+(x.no||"");}).join(" ");
      return hay.toLowerCase().indexOf(gq)>=0;
    });
  }
  var R=ganttRange();
  var unit=S.ganttUnit||"day";
  var cols=ganttColumns(R, unit);      // ⭐ cột theo đơn vị: ngày / tuần / tháng
  var totalCols=cols.length;
  var todayISOv=toISO(R.today);
  var rStart=toISO(R.start), rEnd=toISO(R.end);

  function rangeOverlap(a1,a2){
    if(!a1||!a2) return false;
    var a=String(a1).slice(0,10), b=String(a2).slice(0,10);
    if(b<a){ var t=a;a=b;b=t; }
    return !(b<rStart || a>rEnd);
  }
  function keyInGantt(k){
    var kEff=k.revised||k.planned;
    if(rangeOverlap(k.start, kEff)) return true;
    return (k.subs||[]).some(function(x){ return rangeOverlap(x.start, x.revised||x.planned); });
  }
  kts = kts.filter(keyInGantt);

  var h="";
  h+=timeFilterBar();

  // ⭐ Thanh công cụ Gantt: đơn vị + tìm kiếm + mở/ẩn
  h+='<div class="gantt-toolbar">'
    +'<div class="tf-seg gantt-unit-seg">'
      +'<button class="'+(unit==="day"?"active":"")+'" onclick="setGanttUnit(\'day\')">Ngày</button>'
      +'<button class="'+(unit==="week"?"active":"")+'" onclick="setGanttUnit(\'week\')">Tuần</button>'
      +'<button class="'+(unit==="month"?"active":"")+'" onclick="setGanttUnit(\'month\')">Tháng</button>'
    +'</div>'
    +'<div class="search gantt-search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
      +'<input id="gantt-search" type="text" placeholder="Tìm key task, sub-task, PIC…" value="'+esc(S.ganttQ||"")+'" autocomplete="off"/>'
      +(gq?'<button class="gs-clear" onclick="clearGanttSearch()">✕</button>':'')
    +'</div>'
    +'<button class="gantt-expand-all" onclick="ganttExpandAll()">⇕ Mở/Ẩn sub-task</button>'
    +'</div>';

  h+='<div class="chips" style="margin-bottom:14px"><button class="chip'+(S.ganttType===""?" active":"")+'" onclick="S.ganttType=\'\';renderGantt()">Tất cả loại</button>'
    +types.map(function(t){return '<button class="chip'+(S.ganttType===t?" active":"")+'" style="'+(S.ganttType===t?'background:'+typeColor(t):'')+'" onclick="S.ganttType=\''+jsq(t)+'\';renderGantt()">'+esc(t)+'</button>';}).join("")
    +'</div>';

  // header các cột
  var dayCells=cols.map(function(c){
    var isToday = (todayISOv>=c.from && todayISOv<=c.to);
    return '<div class="gantt-dcell'+(isToday?' today':'')+(c.weekend?' wknd':'')+'">'
      +'<span class="gd-dow">'+esc(c.sub)+'</span>'
      +'<span class="gd-num">'+esc(c.label)+'</span></div>';
  }).join("");

  // vị trí % của 1 ngày trên trục cột
  function posOf(dateStr){
    if(!dateStr) return -1;
    var d=String(dateStr).slice(0,10);
    for(var i=0;i<cols.length;i++){
      if(d>=cols[i].from && d<=cols[i].to) return i;
    }
    if(d<cols[0].from) return -0.001;
    return cols.length-0.001;
  }
  function barStyleU(start,end,color){
    if(!start||!end) return "";
    var a=posOf(start), b=posOf(end);
    if(a<0&&b<0) return "";
    if(a<0)a=0; if(b<0)b=0;
    if(b<a){ var t=a;a=b;b=t; }
    var left=(a/totalCols)*100, width=((b-a+1)/totalCols)*100;
    if(left<0){ width+=left; left=0; }
    if(left>100||width<=0) return "";
    if(left+width>100) width=100-left;
    return "left:"+left+"%;width:"+Math.max(width,1.2)+"%;background:"+color;
  }
  var todayIdx=posOf(todayISOv);
  var todayLeft = todayIdx>=0 ? ((todayIdx+0.5)/totalCols)*100 : -1;

  var body="";
  kts.forEach(function(k){
    var open=!!S.ganttOpen[k.no];
    var subs=k.subs||[];
    var doneCnt=subs.filter(function(x){return isDone(x.status);}).length;
    var kstart=k.start||(subs[0]&&subs[0].start);
    var keff=k.revised||k.planned;
    var kpct=ktProgress(k);
    var kOver=subs.some(isOverdue)||isOverdue(k);
    var kbar=barStyleU(kstart,keff,typeColor(k.type));
    var kTip=esc(k.keyTask)+' — '+kpct+'% · '+esc(k.pic||'');
    body+='<div class="gantt-krow'+(open?' open':'')+(kOver?' g-over':'')+'">'
      +'<div class="gantt-rlabel key" title="'+kTip+'" onclick="ganttToggleKey(\''+jsq(k.no)+'\')">'
        +(subs.length?'<svg class="gantt-caret" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>':'<span style="width:14px"></span>')
        +'<span class="gantt-rdot" style="background:'+stMeta(ktStatus(k)).dot+'"></span>'
        +'<span class="gantt-kname">'+esc(k.keyTask)+(kOver?' <span class="od-chip">QUÁ HẠN</span>':'')+'</span>'
        +'<span class="gantt-kpct" style="color:'+progColor(kpct)+'">'+kpct+'%</span>'
        +(subs.length?'<span class="gantt-ksub">'+doneCnt+'/'+subs.length+'</span>':'')
      +'</div>'
      +'<div class="gantt-track">'+trackCells(cols)
      +(kbar?ganttBarHtml(kbar,kpct,kpct+'%',kTip,"gotoSub('"+jsq(k.no)+"',null)"):'')
      +'</div></div>';
    if(open){
      subs.forEach(function(x){
        var seff=x.revised||x.planned;
        var spct=subPct(x);
        var sc=progColor(spct);
        var od=isOverdue(x);
        var sbar=barStyleU(x.start,seff,od?'#D9433F':sc);
        var sTip=esc(x.name||x.subTask)+' · '+esc(x.pic||'')+' · '+esc(x.status||'—')+' · '+spct+'%';
        var sOpen=!!S.ganttOpenSub[x.no];
        body+='<div class="gantt-srow'+(od?' g-over':'')+(sOpen?' g-open':'')+'">'
          +'<div class="gantt-rlabel sub" title="'+sTip+'" onclick="ganttToggleSub(\''+jsq(x.no)+'\')">'
            +'<svg class="gantt-caret sub-caret'+(sOpen?" open":"")+'" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'
            +'<span class="gantt-rdot" style="background:'+stMeta(x.status).dot+'"></span>'
            +'<span class="gantt-sname">'+esc(x.name||x.subTask)+(od?' <span class="od-chip">QUÁ HẠN</span>':'')+'</span>'
          +'</div>'
          +'<div class="gantt-track">'+trackCells(cols)
          +(sbar?ganttBarHtml(sbar,spct,esc(x.pic||'')+' · '+spct+'%',sTip,"ganttToggleSub('"+jsq(x.no)+"')",true):'')
          +'</div></div>';
        // ⭐ Bấm sub → xổ panel KẾT QUẢ ngay trên Gantt
        if(sOpen){
          body+='<div class="gantt-resrow">'
            +'<div class="g-res-box">'
              +'<div class="g-res-head">'
                +'<span class="g-res-t">'+esc(x.name||x.subTask)+'</span>'
                +'<span class="tc-status '+stMeta(x.status).cls+'">'+esc(x.status||"To Do")+'</span>'
                +'<span class="g-res-pct" style="color:'+progColor(spct)+'">'+spct+'%</span>'
              +'</div>'
              +'<div class="g-res-meta">'
                +'<span>👤 '+esc(x.pic||'—')+'</span>'
                +'<span>🕒 '+(x.start?fmtVN(x.start):'—')+' → '+(seff?fmtVN(seff):'—')+'</span>'
                +(od?'<span class="g-res-od">⚠ Quá hạn</span>':'')
              +'</div>'
              +'<div class="g-res-body">'
                +(x.result&&String(x.result).trim()
                   ? linkify(x.result)
                   : '<span style="color:var(--faint);font-style:italic">— chưa có kết quả —</span>')
              +'</div>'
              +(canEditPic(x.pic)?'<button class="g-res-edit" onclick="event.stopPropagation();openEdit(\''+jsq(x.no)+'\')">✏️ Cập nhật kết quả</button>':'')
            +'</div></div>';
        }
      });
    }
  });
  if(!body) body='<div class="empty"><div class="ic">📊</div><p>'+(gq?'Không tìm thấy công việc khớp "'+esc(S.ganttQ)+'".':'Chưa có key task nào trong khoảng này.')+'</p></div>';

  h+='<div class="gantt-wrap"><div class="gantt-grid">'
    +'<div class="gantt-hrow"><div class="gantt-hlabel">Key Task <small class="gantt-hlabel-sub">— bấm để xem sub · bấm sub để xem kết quả</small></div>'
    +'<div class="gantt-days" style="position:relative">'
      +dayCells
      +(todayLeft>=0&&todayLeft<=100?'<div class="gantt-today-line" style="left:'+todayLeft+'%"><span class="gantt-today-lb">Hôm nay</span></div>':'')
    +'</div></div>'
    +body
    +'</div></div>';
  h+='<div class="gantt-legend">'
    +'<span class="gl-item"><span class="gl-dot" style="background:#D9433F"></span>0–25%</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#E08A00"></span>25–50%</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#3A5CAA"></span>50–75%</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#3FA64B"></span>75–99%</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#1E9E5A"></span>100%</span>'
    +'<span class="gl-item"><span class="gl-dot" style="background:#FFECEC;border:1.5px solid #D9433F"></span>Quá hạn</span>'
    +'</div>';
  $("tab-gantt").innerHTML=h;

  // ⭐ GIỮ FOCUS + con trỏ ở ô tìm kiếm (fix "gõ vài từ bị out khỏi khung")
  var gi=$("gantt-search");
  if(gi){
    gi.oninput=function(){
      S.ganttQ=this.value;
      clearTimeout(window._gq);
      window._gq=setTimeout(function(){ renderGantt(); }, 260);
    };
    if(S._ganttFocus){
      gi.focus();
      try{ gi.setSelectionRange(gi.value.length, gi.value.length); }catch(e){}
    }
    gi.onfocus=function(){ S._ganttFocus=true; };
    gi.onblur=function(){ S._ganttFocus=false; };
  }
}
function ganttBarHtml(style, pct, label, tip, onclickExpr, isSub){
  var inner = pct>0 ? '<div class="gantt-bar-inner" style="width:'+pct+'%"></div>' : '';
  return '<div class="gantt-bar'+(isSub?' gantt-bar-sub':'')+'" style="'+style+'" title="'+tip+'" onclick="'+onclickExpr+'">'
    +inner+'<span class="gbar-lbl">'+esc(label)+'</span></div>';
}
function extractLinks(txt){
  if(!txt) return [];
  var m=String(txt).match(/https?:\/\/[^\s)]+/g);
  return m ? m.filter(function(v,i,a){return a.indexOf(v)===i;}) : [];
}
function linkify(txt){
  var s=esc(String(txt||""));
  s=s.replace(/(https?:\/\/[^\s)]+)/g,'<a href="$1" target="_blank" rel="noopener" class="sc-link">$1</a>');
  s=s.replace(/\n/g,'<br>');
  return s;
}
/* ⭐ Ô kết quả hiển thị NGAY BÊN CẠNH subtask ở tab "Tất cả công việc".
   - Gọn: text preview + chip link (nếu có link). Bấm chip mở link, bấm phần còn lại mở sửa. */
function resultCell(s){
  var raw=String(s.result||"").trim();
  if(!raw) return '<div class="sr-result"><span class="sr-result-empty">—</span></div>';
  var links=extractLinks(raw);
  // text sau khi bỏ URL để hiện gọn
  var textOnly=raw.replace(/https?:\/\/[^\s)]+/g,"").replace(/\s+/g," ").trim();
  var chips=links.slice(0,3).map(function(u,i){
    return '<a class="rlink" href="'+esc(u)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Link'+(links.length>1?(i+1):"")+'</a>';
  }).join("");
  var moreLink = links.length>3 ? '<span class="rlink" style="background:none;color:var(--faint)">+'+(links.length-3)+'</span>' : '';
  var txtHtml = textOnly ? esc(textOnly.slice(0,140))+(textOnly.length>140?'…':'') : '';
  return '<div class="sr-result" title="'+esc(raw.slice(0,300))+'">'+chips+moreLink+(txtHtml?' '+txtHtml:'')+'</div>';
}
/* ⭐ #3: kết quả của Key Task hiển thị inline (dưới header key) */
function keyResultInline(k){
  var raw=String(k.result||"").trim();
  if(!raw) return '';
  var links=extractLinks(raw);
  var textOnly=raw.replace(/https?:\/\/[^\s)]+/g,"").replace(/\s+/g," ").trim();
  var chips=links.slice(0,4).map(function(u,i){
    return '<a class="rlink" href="'+esc(u)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Link'+(links.length>1?(i+1):"")+'</a>';
  }).join("");
  return '<span class="kt-result-lbl">📄 Kết quả:</span> '+chips+(textOnly?' '+esc(textOnly.slice(0,220))+(textOnly.length>220?'…':''):'');
}
function showReferral(sno,name){
  var sub=null;
  allKeyTasks().forEach(function(k){ (k.subs||[]).forEach(function(s){ if(s.no===sno) sub=s; }); });
  if(!sub) return;
  var links=extractLinks(sub.result);
  var list=links.map(function(u){
    return '<a class="ref-item" href="'+esc(u)+'" target="_blank" rel="noopener">'
      +'<span class="ref-ic">🔗</span><span class="ref-url">'+esc(u)+'</span><span class="ref-go">↗</span></a>';
  }).join("");
  var html='<div class="modal-box"><div class="modal-head"><h3>🔗 Tham chiếu — '+esc(name)+'</h3><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-body">'
    +(links.length?'<div class="ref-list">'+list+'</div>':'<p style="color:var(--faint)">Không tìm thấy link nào.</p>')
    +'<div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Đóng</button></div>'
    +'</div></div>';
  showModal(html);
}

/* ══════════════ TAB: DETAIL (Tất cả công việc) ══════════════ */
function renderDetail(){
  var kts=allKeyTasks();
  var types=[...new Set(kts.map(function(k){return k.type;}).filter(Boolean))];
  var pics=picListAll();
  var selTypes=S.detailTypes||[], selPics=S.detailPics||[];
  var h="";
  // ⭐ #5: tab phụ lọc thời gian (Tất cả / Tuần này / Tháng này) như tab Tiến độ
  var tm=S.detailTimeMode||"all";
  h+='<div class="detail-timerow">'
    +'<div class="tf-seg tf-seg-sm">'
      +'<button class="'+(tm==="all"?"active":"")+'" onclick="setDetailTime(\'all\')">Tất cả</button>'
      +'<button class="'+(tm==="week"?"active":"")+'" onclick="setDetailTime(\'week\')">Công việc trong tuần</button>'
      +'<button class="'+(tm==="month"?"active":"")+'" onclick="setDetailTime(\'month\')">CV trong tháng</button>'
    +'</div>'
    +(tm!=="all"?'<div class="dt-timebar"><button class="tf-arrow" onclick="shiftDate(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>'
      +'<span class="tf-label" style="min-width:auto">'+dateRangeLabel()+'</span>'
      +'<button class="tf-arrow" onclick="shiftDate(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button></div>':'<span class="dt-hint">Đang hiển thị <b>toàn bộ</b> công việc</span>')
  +'</div>';
  h+='<div class="detail-toolbar">';
  h+='<div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
    +'<input type="text" id="detail-search" placeholder="Tìm key task, sub-task, PIC…" value="'+esc(S.detailQ||"")+'" oninput="S.detailQ=this.value;clearTimeout(window._dq);window._dq=setTimeout(renderDetailList,200)"/></div>';
  h+=multiFilterDropdown("type","Loại việc",types.map(function(t){return {val:t,label:t,color:typeColor(t)};}),selTypes);
  h+=multiFilterDropdown("pic","Nhân sự",pics.map(function(p){return {val:p,label:p,av:true};}),selPics);
  h+='</div>';
  h+='<div id="detail-list"></div>';
  $("tab-detail").innerHTML=h;
  renderDetailList();   // render danh sách lần đầu
}
/* ⭐ #3: chỉ dựng lại DANH SÁCH (không đụng ô search → không mất focus/nhảy con trỏ) */
function renderDetailList(){
  var el=$("detail-list"); if(!el) return;
  var kts=allKeyTasks();
  var q=(S.detailQ||"").toLowerCase();
  var selTypes=S.detailTypes||[], selPics=S.detailPics||[];
  var tm=S.detailTimeMode||"all";
  var wFrom = tm!=="all" ? S.dateFrom : null;
  var wTo   = tm!=="all" ? S.dateTo   : null;
  var filtered=kts.filter(function(k){
    if(selTypes.length && selTypes.indexOf(k.type)<0) return false;
    if(selPics.length){
      var hit=(selPics.indexOf(k.pic)>=0) || (k.subs||[]).some(function(s){return selPics.indexOf(s.pic)>=0;});
      if(!hit) return false;
    }
    if(q){
      var hay=(k.keyTask||"")+" "+(k.type||"")+" "+(k.pic||"")+" "+(k.subs||[]).map(function(s){return (s.name||s.subTask||"")+" "+(s.pic||"");}).join(" ");
      if(hay.toLowerCase().indexOf(q)<0) return false;
    }
    if(wFrom && wTo){
      var subs=k.subs||[];
      if(!subs.length) return false;
      if(!subs.some(function(s){return subInRangeStrict(s, wFrom, wTo);})) return false;
    }
    return true;
  });
  if(!filtered.length){ el.innerHTML='<div class="empty"><div class="ic">📋</div><p>Không có công việc khớp bộ lọc.</p></div>'; return; }
  el.innerHTML=detailKeyPanels(filtered, wFrom, wTo, null);
}
function setDetailTime(mode){
  S.detailTimeMode=mode;
  if(mode==="week") setDateMode("week");
  else if(mode==="month") setDateMode("month");
  else renderDetail();
}
function multiFilterDropdown(kind,label,items,sel){
  var open=(S.detailFilterOpen===kind);
  var cnt=sel.length;
  var head='<button class="mfd-btn'+(cnt?' active':'')+'" onclick="toggleDetailFilter(\''+kind+'\')">'
    +'<svg class="mfd-ic" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>'
    +esc(label)+(cnt?' ('+cnt+')':'')
    +'<svg class="mfd-caret" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>';
  var list=items.length?items.map(function(it){
    var on=sel.indexOf(it.val)>=0;
    var icon = it.av ? '<span class="mfd-av" style="background:'+avColor(it.val)+'">'+esc(initials(it.val))+'</span>'
              : (it.color?'<span class="mfd-dot" style="background:'+it.color+'"></span>':'');
    return '<div class="mfd-item" onclick="toggleDetailFilterVal(\''+kind+'\',\''+jsq(it.val)+'\')">'
      +'<span class="mfd-check'+(on?' on':'')+'">'+(on?'✓':'')+'</span>'+icon
      +'<span class="mfd-name">'+esc(it.label)+'</span></div>';
  }).join(""):'<div class="mfd-empty">Không có mục</div>';
  return '<div class="mfd'+(open?' open':'')+'">'+head
    +'<div class="mfd-panel"><div class="mfd-head"><b>'+esc(label)+'</b>'
    +(cnt?'<button class="mfd-clear" onclick="clearDetailFilter(\''+kind+'\')">Xóa lọc</button>':'')
    +'</div><div class="mfd-list">'+list+'</div></div></div>';
}
/* ⭐ v5.2: thêm nhóm "opic"/"otype" cho tab Tổng quan */
function mfdRender(kind){
  if(kind==="mtype"||kind==="mpic") renderMonth();
  else if(kind==="gtype"||kind==="gpic") renderGantt();
  else if(kind==="opic"||kind==="otype") renderOverview();
  else renderDetail();
}
function toggleDetailFilter(kind){ S.detailFilterOpen=(S.detailFilterOpen===kind)?"":kind; mfdRender(kind); }
function toggleDetailFilterVal(kind,val){
  var arr;
  if(kind==="type")arr=S.detailTypes;
  else if(kind==="pic")arr=S.detailPics;
  else if(kind==="mtype")arr=(S.monthTypes=S.monthTypes||[]);
  else if(kind==="mpic")arr=(S.monthPics=S.monthPics||[]);
  else if(kind==="gtype")arr=(S.ganttTypes=S.ganttTypes||[]);
  else if(kind==="gpic")arr=(S.ganttPics=S.ganttPics||[]);
  else if(kind==="otype")arr=(S.ovTypes=S.ovTypes||[]);
  else if(kind==="opic")arr=(S.ovPics=S.ovPics||[]);
  else return;
  var i=arr.indexOf(val);
  if(i>=0) arr.splice(i,1); else arr.push(val);
  mfdRender(kind);
}
function clearDetailFilter(kind){
  if(kind==="type")S.detailTypes=[];
  else if(kind==="pic")S.detailPics=[];
  else if(kind==="mtype")S.monthTypes=[];
  else if(kind==="mpic")S.monthPics=[];
  else if(kind==="gtype")S.ganttTypes=[];
  else if(kind==="gpic")S.ganttPics=[];
  else if(kind==="otype")S.ovTypes=[];
  else if(kind==="opic"){ S.ovPics=[]; S.overviewPic=""; }
  mfdRender(kind);
}
document.addEventListener("click",function(e){
  if(S.detailFilterOpen && !e.target.closest(".mfd")){
    var k=S.detailFilterOpen; S.detailFilterOpen="";
    if(k==="mtype"||k==="mpic"){ if(S.tab==="month")renderMonth(); }
    else if(k==="gtype"||k==="gpic"){ if(S.tab==="gantt")renderGantt(); }
    else if(k==="opic"||k==="otype"){ if(S.tab==="overview")renderOverview(); }
    else if(S.tab==="detail")renderDetail();
  }
});

/* Panels key + sub — DÙNG CHUNG cho Overview(lọc PIC) và Detail.
   ⭐ #1: mỗi .kt-panel có data-kno; mỗi sub-row có id="sub-<no>" để scroll+highlight. */
function detailKeyPanels(keys, from, to, picFilter){
  return keys.map(function(k){
    var open=!!S.detailOpen[k.no];
    var subs=(k.subs||[]).slice();
    // lọc theo PIC nếu đang ở overview-per-pic
    if(picFilter) subs=subs.filter(function(s){return picOf(s)===picFilter;});
    // lọc thời gian (nếu có) — trừ khi user yêu cầu hiện tất cả
    var showAll=!!S.detailShowAllSubs[k.no];
    var subsInRange=subs, hiddenCount=0;
    if(from && to && !showAll){
      var inr=subs.filter(function(s){return subInRangeStrict(s,from,to);});
      hiddenCount=subs.length-inr.length;
      subsInRange=inr;
    }
    var kpct=ktProgress(k), kst=ktStatus(k), km=stMeta(kst);
    var doneCnt=subs.filter(function(s){return isDone(s.status);}).length;
    var canAddSub=isManager()||true;
    var kOver=subs.some(isOverdue)||isOverdue(k);   // ⭐ key có sub quá hạn
    var canEditK=canEditPic(k.pic)||canAssign();
    var h='<div class="kt-panel'+(kOver?' od-key':'')+'" data-kno="'+esc(k.no)+'">';
    h+='<div class="kt-head'+(open?' open':'')+'" onclick="toggleDetail(\''+jsq(k.no)+'\')"'
      +(canEditK?' ondblclick="event.stopPropagation();openEditKey(\''+jsq(k.no)+'\')" title="Double-click để cập nhật Key Task"':'')+'>'
      +'<svg class="kt-caret" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'
      +'<span class="kt-type-tag" style="background:'+typeColor(k.type)+'22;color:'+typeColor(k.type)+'">'+esc(k.type||'—')+'</span>'
      +'<span class="kt-title">'+esc(k.keyTask)+(kOver?'<span class="od-chip">QUÁ HẠN</span>':'')+'</span>'
      +'<div class="kt-hmeta">'
        +'<span class="khm khm-pic"><span class="khm-av" style="background:'+avColor(k.pic)+'">'+esc(initials(k.pic||'?'))+'</span>'+esc(k.pic||'—')+'</span>'
        +'<span class="khm khm-date">🕒 '+(k.start?fmtVN(k.start):'—')+' → '+(effDate(k)?fmtVN(effDate(k)):'—')+'</span>'
        +'<span class="khm khm-sub">'+doneCnt+'/'+subs.length+'</span>'
        +'<span class="khm khm-prog"><span class="kt-progbar"><span class="kt-progfill" style="width:'+kpct+'%;background:'+progColor(kpct)+'"></span></span></span>'
        +'<span class="khm khm-pct" style="color:'+progColor(kpct)+'">'+kpct+'%</span>'
        +'<span class="khm khm-status"><span class="tc-status '+km.cls+'">'+esc(kst)+'</span></span>'
      +'</div>';
    if(canEditPic(k.pic) || canAssign()){
      h+='<div class="kt-actions" onclick="event.stopPropagation()">'
        +'<button class="icon-btn" title="Sửa Key Task" onclick="openEditKey(\''+jsq(k.no)+'\')">✏️</button>';
      if(canAssign()) h+='<button class="icon-btn" title="Xóa Key Task" onclick="delKey(\''+jsq(k.no)+'\')">🗑️</button>';

/* ── Sửa nhanh tiến độ / trạng thái ── */
function onDragProg(sno,val){ var el=$("pct-"+sno); if(el)el.textContent=val+"%"; }
function bumpProg(sno,delta){
  var sub=findSub(sno); if(!sub)return;
  var cur=subPct(sub), nv=Math.max(0,Math.min(100,cur+delta));
  commitProg(sno,nv);
}
/* ⭐ #2: cập nhật CỤC BỘ + render ngay (tức thì), lưu ngầm nền — không overlay, không refetch */
function commitProg(sno,val){
  var sub=findSub(sno); if(!sub)return;
  if(!canEditPic(sub.pic)){ toast("🔒 Chỉ "+(sub.pic||"PIC")+" sửa được"); return; }
  var v=parseInt(val,10); if(isNaN(v))v=0;
  var newStatus=sub.status;
  if(v>=100){ newStatus="Completed"; }
  else if(v>0 && (/to\s*do/i.test(sub.status)||!sub.status)){ newStatus="In Progress"; }
  sub.progress=v/100; sub.status=newStatus;
  rerenderActive();                 // đổi màu + thanh + status ngay lập tức
  quietSave(sno,{action:"updateProgress",no:sno,progress:v,status:newStatus});
}
function quickStatus(sno,val){
  var sub=findSub(sno); if(!sub)return;
  if(!canEditPic(sub.pic)){ toast("🔒 Chỉ "+(sub.pic||"PIC")+" sửa được"); rerenderActive(); return; }
  var prog=subPct(sub);
  // ⭐ #2: Completed→100; Cancelled/To Do→0; In Progress mà đang 0 → 25%.
  //        Đặc biệt: Completed(100%)→In Progress phải về 25% (không giữ 100%)
  if(isDone(val)) prog=100;
  else if(isCancelled(val)) prog=0;
  else if(/to\s*do/i.test(val)) prog=0;
  else if(isInProgress(val)){ if(prog<=0 || prog>=100) prog=25; }
  sub.status=val; sub.progress=prog/100;
  rerenderActive();
  quietSave(sno,{action:"updateProgress",no:sno,progress:prog,status:val});
}
/* lưu ngầm nền — debounce theo sub, không overlay, chỉ toast lỗi */
var _saveTimer={};
function quietSave(sno,body){
  clearTimeout(_saveTimer[sno]);
  _saveTimer[sno]=setTimeout(function(){
    apiPost(body).catch(function(e){ toast("⚠️ Lưu thất bại: "+e.message); reloadSoft(); });
  }, 400);
}
function findSub(sno){
  var found=null;
  S.keyTasks.forEach(function(k){ (k.subs||[]).forEach(function(s){ if(s.no===sno)found=s; }); });
  return found;
}
function findKeyOfSub(sno){
  var kk=null;
  S.keyTasks.forEach(function(k){ (k.subs||[]).forEach(function(s){ if(s.no===sno)kk=k; }); });
  return kk;
}

function initReportRange(){
  if(!S.reportFrom||!S.reportTo){
    var mon=mondayOf(new Date()), sun=new Date(mon); sun.setDate(mon.getDate()+6);
    S.reportFrom=toISO(mon); S.reportTo=toISO(sun);
  }
}
function renderReport(){
  initReportRange();
  var thisFrom=S.reportFrom, thisTo=S.reportTo;
  var nextFrom=addDaysISO(thisTo,1), nextTo=addDaysISO(thisTo,7);
  var pics=picListAll();
  var selPics=S.reportPics||[];
  function collect(from,to){
    var out=[];
    S.keyTasks.forEach(function(k){
      var subs=(k.subs||[]).filter(function(s){
        if(selPics.length && selPics.indexOf(s.pic)<0) return false;
        return subInRange(s,from,to);
      });
      if(subs.length) out.push({k:k,subs:subs});
    });

  }
  var thisData=collect(thisFrom,thisTo);
  var nextData=collect(nextFrom,nextTo);
  var h="";
  h+='<div class="report-toolbar">';
  h+='<div class="tf-nav"><button class="tf-arrow" onclick="shiftReport(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>'
    +'<span class="tf-label">'+fmtVNFull(thisFrom)+' – '+fmtVNFull(thisTo)+'</span>'
    +'<button class="tf-arrow" onclick="shiftReport(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button></div>';

  h+='</div>';

  h+=reportSection("this","Kết quả tuần này", thisFrom,thisTo, thisData);
  h+=reportSection("next","Plan tuần sau",   nextFrom,nextTo, nextData);

function renderMonth(){
  var months=[...new Set(S.monthly.map(function(m){return m.month;}).filter(Boolean))].sort().reverse();
  if(!S.monthSel && months.length) S.monthSel=months[0];
  var types=[...new Set(S.monthly.map(function(m){return m.type;}).filter(Boolean))];
  // ⭐ #1: PIC mặc định thấy sẵn task của mình (chưa từng đặt bộ lọc → tự set = mình)
  if(!S._monthPicInit){
    S._monthPicInit=true;
    if(!canAssign() && S.user && S.user.pic) S.monthPics=[S.user.pic];
  }
  var selTypes=S.monthTypes||[], selPics=S.monthPics||[];
  /* ⭐ v5.2: PIC của MONTH (Back Office cột G) hay bị TRỐNG → gom vào "— chưa gán —",
     và không bao giờ lấy tên task làm PIC nữa (whitelist isRealPic). */
  var pics=[...new Set(S.monthly.map(picOf))].sort(function(a,b){
    if(a===NO_PIC) return 1; if(b===NO_PIC) return -1; return a<b?-1:1;
  });
  var rows=S.monthly.filter(function(m){
    if(S.monthSel && m.month!==S.monthSel) return false;
    if(selTypes.length && selTypes.indexOf(m.type)<0) return false;
    if(selPics.length && selPics.indexOf(picOf(m))<0) return false;
    return true;
  });
  var h="";
  h+='<div class="month-toolbar">';
  h+='<div class="tf-nav"><button class="tf-arrow" onclick="shiftMonth(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>'

    +months.map(function(m){return '<option value="'+esc(m)+'"'+(m===S.monthSel?' selected':'')+'>'+esc(fmtMonth(m))+'</option>';}).join("")+'</select></div>';
  // ⭐ #1: 2 bộ lọc Loại việc + Nhân sự
  h+=multiFilterDropdown("mtype","Loại việc",types.map(function(t){return {val:t,label:t,color:typeColor(t)};}),selTypes);
  h+=multiFilterDropdown("mpic","Nhân sự",pics.map(function(p){return {val:p,label:p,av:true};}),selPics);

  h+='<div class="sp" style="flex:1"></div>';
  if(canAssign()) h+='<button class="btn-secondary" onclick="openSendMonth()"><svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Xuất PDF báo cáo tháng</button>';
  if(canAssign()||isManager()) h+='<button class="btn-primary" onclick="openAddMonth()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Thêm mục</button>';
  h+='</div>';
  if(!rows.length){ h+='<div class="empty"><div class="ic">📅</div><p>Chưa có báo cáo tháng cho '+esc(fmtMonth(S.monthSel)||'kỳ này')+'.</p></div>'; }
  else{
    h+='<div class="mr-grid">';

function edStatusChange(){
  var st=$("ed-status").value;
  var wrap=$("ed-prog-wrap");
  if(isDone(st)){ $("ed-prog").value=100; $("ed-prog-val").textContent="100%"; wrap.classList.remove("show"); }
  else if(isCancelled(st)){ wrap.classList.remove("show"); }
  else {
    wrap.classList.add("show");
    // ⭐ #2: To Do → In Progress: nếu đang 0% thì set 25%
    if(isInProgress(st)){
      var cur=parseInt($("ed-prog").value,10)||0;
      if(cur<=0){ $("ed-prog").value=25; $("ed-prog-val").textContent="25%"; }
    }
  }
}
/* ⭐ #2: kéo slider trong modal → tự đổi status. 0→>0: In Progress; =100: Completed */
function edProgChange(v){
  var val=parseInt(v,10)||0;
  $("ed-prog-val").textContent=val+"%";
  var sel=$("ed-status");
  var cur=sel.value;
  if(val>=100){ if(!isDone(cur)) setSelectVal(sel,"Completed"); }
  else if(val>0){ if(/to\s*do/i.test(cur)||!cur) setSelectVal(sel,"In Progress"); }
}
function setSelectVal(sel,val){
  for(var i=0;i<sel.options.length;i++){ if(sel.options[i].value===val){ sel.selectedIndex=i; return; } }
}
function saveEdit(){
  var sno=S.editCtx.no;

  var status=$("ed-status").value;
  var prog=parseInt($("ed-prog").value,10); if(isNaN(prog))prog=0;
  if(isDone(status))prog=100; if(isCancelled(status))prog=0;
  var start=$("ed-start").value;
  var revised=$("ed-revised").value;
  var result=$("ed-result").value;
  $("ed-save").disabled=true;
  // ⭐ cập nhật cục bộ + đóng modal NGAY; ghi sheet chạy nền
  localPatchSub(sno,{ name:name, subTask:name, pic:pic, status:status,
                      progress:prog/100, start:start, revised:revised, result:result });
  closeModal(); toast("✓ Đã lưu");
  apiPost({action:"updateSub",no:sno,name:name,pic:pic,status:status,progress:prog,start:start,revised:revised,result:result})
    .then(function(){ reloadSoft(); })
    .catch(function(e){ toast("⚠️ Lỗi ghi sheet: "+e.message); reloadSoft(); });
}

/* tải file PDF từ chuỗi base64 */
function downloadB64Pdf(b64, filename){
  try{
    var bin=atob(b64), len=bin.length, bytes=new Uint8Array(len);
    for(var i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
    var blob=new Blob([bytes], {type:"application/pdf"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url; a.download=filename||"report.pdf";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 1500);
  }catch(e){ toast("⚠️ Lỗi tải PDF: "+e.message); }
}

var _rec=null,_recTarget=null;
function toggleVoice(targetId){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast("Trình duyệt không hỗ trợ nhập giọng nói"); return; }
  var btns=document.querySelectorAll(".voice-btn");
  if(_rec){ _rec.stop(); _rec=null; btns.forEach(function(b){b.classList.remove("rec");}); return; }
  _rec=new SR(); _rec.lang="vi-VN"; _rec.continuous=true; _rec.interimResults=false;
  _recTarget=targetId;
  var el=$(targetId);
  _rec.onresult=function(e){
    var txt="";
    for(var i=e.resultIndex;i<e.results.length;i++){ txt+=e.results[i][0].transcript; }
    el.value=(el.value?el.value+" ":"")+txt;
  };
  _rec.onerror=function(){ toast("Lỗi nhận giọng nói"); };
  _rec.onend=function(){ _rec=null; document.querySelectorAll(".voice-btn").forEach(function(b){b.classList.remove("rec");}); };
  _rec.start();
  event.target.classList.add("rec");
}

/* ══════════════ ⭐ v5: NOTIFICATION — công việc của tôi ở MỌI phòng ban ══════════════
 * Sau khi login, gọi action 'myTasks' tới CẢ 3 nguồn (song song, không chặn UI).
 * Hiện thanh vàng: "Bạn có N công việc — Marketing 3 · Back Office 2 · Management 1" */
function jsonpTo(url, params){
  return new Promise(function(resolve){
    var cb="__mmh_x_"+Date.now()+"_"+(++_jsonpSeq);
    var sc=document.createElement("script");
    var timer=setTimeout(function(){ cleanup(); resolve(null); }, 20000);
    function cleanup(){ clearTimeout(timer); delete window[cb]; if(sc.parentNode) sc.parentNode.removeChild(sc); }
    window[cb]=function(d){ cleanup(); resolve(d); };
    params.callback=cb;
    var qs=Object.keys(params).map(function(k){ return encodeURIComponent(k)+"="+encodeURIComponent(params[k]==null?"":params[k]); }).join("&");
    sc.src=url+"?"+qs;
    sc.onerror=function(){ cleanup(); resolve(null); };
    document.body.appendChild(sc);
  });
}
/* ⭐ v5.2: so tên PIC "chuẩn hoá" (bỏ dấu, bỏ khoảng trắng thừa, không phân biệt hoa/thường) */

  return String(v||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")

}

        tasks=tasks.filter(function(t){ return !t || t.pic==null ? true : normName(t.pic)===me; });

var ACT_TYPE_META={
  add:      {badge:"add",      lbl:"Thêm mới"},
  update:   {badge:"update",   lbl:"Cập nhật"},
  progress: {badge:"progress", lbl:"Tiến độ"},
  complete: {badge:"complete", lbl:"Hoàn thành"},
  assign:   {badge:"assign",   lbl:"Giao việc"},
  priority: {badge:"priority", lbl:"Ưu tiên"},
  delete:   {badge:"delete",   lbl:"Xóa"},
  report:   {badge:"report",   lbl:"Báo cáo"}
};
/* gộp progress→update để khớp bộ lọc "Cập nhật" */
function actTypeKey(a){
  var t=String(a.type||a.action||"").toLowerCase();
  if(/complet/.test(t)) return "complete";
  if(/progress|update|edit|sua|cập|cap/.test(t)) return "update";
  if(/add|them|thêm|create|new/.test(t)) return "add";
  if(/assign|giao/.test(t)) return "assign";
  if(/priorit|ưu tiên|uu tien/.test(t)) return "priority";
  if(/delet|xoa|xóa|remove/.test(t)) return "delete";
  if(/report|mail|email|báo cáo|bao cao|send/.test(t)) return "report";
  return "update";
}
function actInScope(a){
  var d=a.time||a.at||a.date||"";
  var iso=String(d).slice(0,10);
  var okTime=true;
  if(iso){
    var off=S.activityOffset||0;
    if(S.activityScope==="week"){
      var mon=mondayOf(new Date()); mon.setDate(mon.getDate()+off*7);
      var sun=new Date(mon); sun.setDate(mon.getDate()+6);
      okTime=(iso>=toISO(mon) && iso<=toISO(sun));
    } else {
      var today=new Date();
      var first=new Date(today.getFullYear(), today.getMonth()+off, 1);
      var last=new Date(today.getFullYear(), today.getMonth()+off+1, 0);
      okTime=(iso>=toISO(first) && iso<=toISO(last));
    }
  }
  if(S.activityPic){
    var who=String(a.pic||a.who||a.user||"").toLowerCase();
    if(who!==S.activityPic.toLowerCase()) return false;
  }
  if(S.activityType){
    if(actTypeKey(a)!==S.activityType) return false;
  }
  return okTime;
}
function activityRangeLabel(){
  var off=S.activityOffset||0;
  if(S.activityScope==="week"){
    if(off===0) return "Tuần này";
    var mon=mondayOf(new Date()); mon.setDate(mon.getDate()+off*7);
    var sun=new Date(mon); sun.setDate(mon.getDate()+6);
    return fmtVN(toISO(mon))+" – "+fmtVN(toISO(sun));
  } else {
    if(off===0) return "Tháng này";
    var today=new Date(), f=new Date(today.getFullYear(), today.getMonth()+off, 1);
    return "Tháng "+("0"+(f.getMonth()+1)).slice(-2)+"/"+f.getFullYear();
  }
}

  S.activityScope=scope; S.activityOffset=0;
  $("act-scope-week").classList.toggle("active",scope==="week");
  $("act-scope-month").classList.toggle("active",scope==="month");
  renderActivity();
}

    S.activityLog=[]; overlay(false); toast("✓ Đã xóa sạch lịch sử"); renderActivity();
  }).catch(function(e){ overlay(false); toast("⚠️ "+e.message); });
}
function toggleActivityRail(){
  var rail=$("activity-rail");
  rail.classList.toggle("collapsed");
  S.activityOpen=!rail.classList.contains("collapsed");
}
function actRelTime(d){
  if(!d) return "";
  var t=new Date(String(d).replace(" ","T"));
  if(isNaN(t)) return String(d);
  var diff=(Date.now()-t)/1000;
  if(diff<60) return "vừa xong";
  if(diff<3600) return Math.floor(diff/60)+" phút trước";
  if(diff<86400) return Math.floor(diff/3600)+" giờ trước";
  if(diff<604800) return Math.floor(diff/86400)+" ngày trước";
  return fmtVNFull(toISO(t));
}
function populateActivityPicFilter(){
  var sel=$("act-filter-pic"); if(!sel) return;
  var cur=S.activityPic;
  var pics={};
  (S.activityLog||[]).forEach(function(a){ var p=a.pic||a.who||a.user; if(p)pics[p]=1; });
  picListAll().forEach(function(p){ pics[p]=1; });
  var names=Object.keys(pics).sort();
  sel.innerHTML='<option value="">👥 All PIC</option>'+names.map(function(p){
    return '<option value="'+esc(p)+'"'+(p===cur?' selected':'')+'>'+esc(p)+'</option>';
  }).join("");
}
function renderActivity(){
  populateActivityPicFilter();
  var lbl=$("act-nav-label"); if(lbl) lbl.textContent=activityRangeLabel();
  var track=$("act-track"); if(!track) return;
  var logs=(S.activityLog||[]).filter(actInScope);
  // sắp xếp mới nhất trước
  logs.sort(function(a,b){
    var ta=new Date(String(a.time||a.at||a.date||"").replace(" ","T")).getTime()||0;
    var tb=new Date(String(b.time||b.at||b.date||"").replace(" ","T")).getTime()||0;
    return tb-ta;
  });
  if(!logs.length){
    track.className="act-track";
    track.style.removeProperty("--act-shift");
    track.style.animationDuration="";
    track.innerHTML='<div class="act-empty">Không có hoạt động'
      +(S.activityPic||S.activityType?' khớp bộ lọc':'')+'.</div>';
    return;
  }
  function cardHtml(a){
    var who=a.pic||a.who||a.user||"?";
    var key=actTypeKey(a), meta=ACT_TYPE_META[key]||ACT_TYPE_META.update;
    var detail=a.detail||a.message||a.text||a.taskName||a.name||"";
    var when=a.time||a.at||a.date||"";
    return '<div class="act-card">'
      +'<div class="act-card-h">'
        +'<span class="act-av" style="background:'+avColor(who)+'">'+esc(initials(who))+'</span>'
        +'<span class="act-who">'+esc(who)+'</span>'
        +'<span class="act-badge '+meta.badge+'">'+esc(meta.lbl)+'</span>'
      +'</div>'
      +(detail?'<div class="act-detail">'+esc(String(detail).slice(0,160))+'</div>':'')
      +'<div class="act-time">'+esc(actRelTime(when))+'</div>'
    +'</div>';
  }
  var cards=logs.map(cardHtml).join("");
  // ⭐ cuộn LIÊN TỤC LÊN TRÊN: nhân đôi nội dung + animate translateY(-50%)
  // chỉ chạy khi đủ nhiều thẻ để không bị giật; tốc độ ~ số thẻ (chậm, êm)
  if(logs.length>=4){
    track.className="act-track anim";
    track.innerHTML=cards+cards;           // nhân đôi để loop liền mạch
    track.style.setProperty("--act-shift","-50%");
    var dur=Math.max(28, logs.length*6);   // càng nhiều thẻ càng lâu → tốc độ đều, chậm
    track.style.animationDuration=dur+"s";
  } else {
    track.className="act-track";
    track.style.removeProperty("--act-shift");
    track.style.animationDuration="";
    track.innerHTML=cards;
  }
}
</script>
